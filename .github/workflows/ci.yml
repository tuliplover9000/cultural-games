name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: JS syntax (node --check, all first-party files)
        run: node ci/ci-syntax.js
      - name: Structured data (every JSON-LD block parses)
        run: node ci/ci-jsonld.js
      - name: UI regression sweep (emoji / fonts / mojibake / dialogs / include order)
        run: node ci/ci-sweep.js
