
<style>
  .wrap { background: #1A1208; border-radius: 20px; padding: 40px; display: flex; gap: 40px; justify-content: center; align-items: center; flex-wrap: wrap; }
  .tile { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .label { font-family: Georgia, serif; font-size: 11px; color: #7A5010; letter-spacing: 2px; text-transform: uppercase; }
</style>
<div class="wrap">

  <div class="tile">
    <svg width="280" height="280" viewBox="-100 -100 200 200" xmlns="http://www.w3.org/2000/svg">
      <rect x="-100" y="-100" width="200" height="200" rx="20" fill="#1A1208"/>
      <defs>
        <!-- C gradient: bright gold at spine (left), fades to pale at tips (right) -->
        <linearGradient id="cgrad" x1="-1" y1="0" x2="1" y2="0" gradientUnits="userSpaceOnUse">
          <stop offset="0%"   stop-color="#FAC775"/>
          <stop offset="50%"  stop-color="#EF9F27"/>
          <stop offset="100%" stop-color="#BA7517"/>
        </linearGradient>
        <!-- G gradient: warm gold to amber -->
        <linearGradient id="ggrad" x1="-1" y1="0" x2="1" y2="0" gradientUnits="userSpaceOnUse">
          <stop offset="0%"   stop-color="#FAC775"/>
          <stop offset="100%" stop-color="#D85A30"/>
        </linearGradient>
      </defs>

      <!-- Ornament rings -->
      <circle r="88" fill="none" stroke="#BA7517" stroke-width="0.7" opacity="0.45"/>
      <circle r="92" fill="none" stroke="#BA7517" stroke-width="0.4" stroke-dasharray="3 5" opacity="0.25"/>

      <!-- 8 diamond ticks -->
      <g fill="#EF9F27" opacity="0.6">
        <polygon points="0,-94 2.5,-88 0,-82 -2.5,-88" transform="rotate(0)"/>
        <polygon points="0,-94 2.5,-88 0,-82 -2.5,-88" transform="rotate(45)"/>
        <polygon points="0,-94 2.5,-88 0,-82 -2.5,-88" transform="rotate(90)"/>
        <polygon points="0,-94 2.5,-88 0,-82 -2.5,-88" transform="rotate(135)"/>
        <polygon points="0,-94 2.5,-88 0,-82 -2.5,-88" transform="rotate(180)"/>
        <polygon points="0,-94 2.5,-88 0,-82 -2.5,-88" transform="rotate(225)"/>
        <polygon points="0,-94 2.5,-88 0,-82 -2.5,-88" transform="rotate(270)"/>
        <polygon points="0,-94 2.5,-88 0,-82 -2.5,-88" transform="rotate(315)"/>
      </g>
      <g stroke="#BA7517" stroke-width="0.8" opacity="0.3">
        <line x1="0" y1="-88" x2="0" y2="-93" transform="rotate(22.5)"/>
        <line x1="0" y1="-88" x2="0" y2="-93" transform="rotate(67.5)"/>
        <line x1="0" y1="-88" x2="0" y2="-93" transform="rotate(112.5)"/>
        <line x1="0" y1="-88" x2="0" y2="-93" transform="rotate(157.5)"/>
        <line x1="0" y1="-88" x2="0" y2="-93" transform="rotate(202.5)"/>
        <line x1="0" y1="-88" x2="0" y2="-93" transform="rotate(247.5)"/>
        <line x1="0" y1="-88" x2="0" y2="-93" transform="rotate(292.5)"/>
        <line x1="0" y1="-88" x2="0" y2="-93" transform="rotate(337.5)"/>
      </g>

      <!-- C — two halves with notch gap at spine, gradient stroke -->
      <!-- Top half: tip (38,-55) → just above spine (-67,-8) -->
      <path d="M 38,-55 A 67,67 0 0 0 -67,-8"
            fill="none" stroke="url(#cgrad)" stroke-width="15" stroke-linecap="round"/>
      <!-- Bottom half: just below spine (-67,8) → tip (38,55) -->
      <path d="M -67,8 A 67,67 0 0 0 38,55"
            fill="none" stroke="url(#cgrad)" stroke-width="15" stroke-linecap="round"/>

      <!-- Notch diamond at spine — coral red, pops against the gold -->
      <polygon points="-67,0 -58,-9 -49,0 -58,9" fill="#D85A30"/>
      <polygon points="-67,0 -58,-9 -49,0 -58,9" fill="none" stroke="#FAC775" stroke-width="0.8" opacity="0.5"/>

      <!-- G arc — gradient stroke -->
      <path d="M 22,-31 A 38,38 0 1 0 38,0"
            fill="none" stroke="url(#ggrad)" stroke-width="13" stroke-linecap="round"/>
      <!-- G crossbar -->
      <line x1="38" y1="0" x2="12" y2="0"
            stroke="url(#ggrad)" stroke-width="13" stroke-linecap="round"/>

      <!-- Overlap dot — in the gap between C top tip and G top tip -->
      <circle cx="38" cy="-28" r="8" fill="#D85A30"/>
      <circle cx="38" cy="-28" r="4" fill="#FAC775" opacity="0.55"/>
    </svg>
    <div class="label">Full size</div>
  </div>

  <!-- 64px -->
  <div class="tile">
    <svg width="64" height="64" viewBox="-100 -100 200 200" xmlns="http://www.w3.org/2000/svg">
      <rect x="-100" y="-100" width="200" height="200" rx="16" fill="#1A1208"/>
      <defs>
        <linearGradient id="cg2" x1="-1" y1="0" x2="1" y2="0" gradientUnits="userSpaceOnUse">
          <stop offset="0%"   stop-color="#FAC775"/>
          <stop offset="100%" stop-color="#BA7517"/>
        </linearGradient>
        <linearGradient id="gg2" x1="-1" y1="0" x2="1" y2="0" gradientUnits="userSpaceOnUse">
          <stop offset="0%"   stop-color="#FAC775"/>
          <stop offset="100%" stop-color="#D85A30"/>
        </linearGradient>
      </defs>
      <circle r="88" fill="none" stroke="#BA7517" stroke-width="1" opacity="0.4"/>
      <g fill="#EF9F27" opacity="0.6">
        <polygon points="0,-94 2.5,-88 0,-82 -2.5,-88" transform="rotate(0)"/>
        <polygon points="0,-94 2.5,-88 0,-82 -2.5,-88" transform="rotate(90)"/>
        <polygon points="0,-94 2.5,-88 0,-82 -2.5,-88" transform="rotate(180)"/>
        <polygon points="0,-94 2.5,-88 0,-82 -2.5,-88" transform="rotate(270)"/>
      </g>
      <path d="M 38,-55 A 67,67 0 0 0 -67,-8" fill="none" stroke="url(#cg2)" stroke-width="17" stroke-linecap="round"/>
      <path d="M -67,8 A 67,67 0 0 0 38,55"  fill="none" stroke="url(#cg2)" stroke-width="17" stroke-linecap="round"/>
      <polygon points="-67,0 -58,-9 -49,0 -58,9" fill="#D85A30"/>
      <path d="M 22,-31 A 38,38 0 1 0 38,0" fill="none" stroke="url(#gg2)" stroke-width="14" stroke-linecap="round"/>
      <line x1="38" y1="0" x2="12" y2="0" stroke="url(#gg2)" stroke-width="14" stroke-linecap="round"/>
      <circle cx="38" cy="-28" r="8" fill="#D85A30"/>
      <circle cx="38" cy="-28" r="4" fill="#FAC775" opacity="0.55"/>
    </svg>
    <div class="label">64px</div>
  </div>

  <!-- favicon -->
  <div class="tile">
    <svg width="32" height="32" viewBox="-100 -100 200 200" xmlns="http://www.w3.org/2000/svg">
      <rect x="-100" y="-100" width="200" height="200" rx="14" fill="#1A1208"/>
      <defs>
        <linearGradient id="cg3" x1="-1" y1="0" x2="1" y2="0" gradientUnits="userSpaceOnUse">
          <stop offset="0%"   stop-color="#FAC775"/>
          <stop offset="100%" stop-color="#BA7517"/>
        </linearGradient>
        <linearGradient id="gg3" x1="-1" y1="0" x2="1" y2="0" gradientUnits="userSpaceOnUse">
          <stop offset="0%"   stop-color="#FAC775"/>
          <stop offset="100%" stop-color="#D85A30"/>
        </linearGradient>
      </defs>
      <path d="M 38,-55 A 67,67 0 0 0 -67,-8" fill="none" stroke="url(#cg3)" stroke-width="19" stroke-linecap="round"/>
      <path d="M -67,8 A 67,67 0 0 0 38,55"  fill="none" stroke="url(#cg3)" stroke-width="19" stroke-linecap="round"/>
      <polygon points="-67,0 -58,-9 -49,0 -58,9" fill="#D85A30"/>
      <path d="M 22,-31 A 38,38 0 1 0 38,0" fill="none" stroke="url(#gg3)" stroke-width="16" stroke-linecap="round"/>
      <line x1="38" y1="0" x2="12" y2="0" stroke="url(#gg3)" stroke-width="16" stroke-linecap="round"/>
      <circle cx="38" cy="-28" r="9" fill="#D85A30"/>
    </svg>
    <div class="label">Favicon</div>
  </div>

</div>
