<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 110">

  <!-- ── Emblem mark ── -->
  <!-- Outer octagon -->
  <path d="M55 6 L84 14 L96 42 L84 70 L55 78 L26 70 L14 42 L26 14 Z"
        fill="#1A0E06" stroke="#C89B3C" stroke-width="2.8"/>
  <!-- Inner octagon ring -->
  <path d="M55 13 L79 20 L89 42 L79 64 L55 71 L31 64 L21 42 L31 20 Z"
        fill="none" stroke="#C89B3C" stroke-width="0.7" opacity="0.3"/>

  <!-- Bold V chevron -->
  <polyline points="26,28 55,56 84,28"
            fill="none" stroke="#C89B3C" stroke-width="6.5"
            stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Three game-piece dots -->
  <circle cx="40" cy="68" r="3.8" fill="#C89B3C"/>
  <circle cx="55" cy="68" r="3.8" fill="#C89B3C"/>
  <circle cx="70" cy="68" r="3.8" fill="#B83232"/>

  <!-- ── Wordmark ── -->
  <!-- VSG -->
  <text x="118" y="58"
        font-family="Georgia, 'Times New Roman', serif"
        font-weight="700"
        font-size="52"
        fill="#C89B3C"
        letter-spacing="-1.5">VSG</text>

  <!-- Horizontal rule between VSG and subtitle -->
  <line x1="118" y1="67" x2="372" y2="67"
        stroke="#C89B3C" stroke-width="0.9" opacity="0.4"/>

  <!-- CULTURAL GAMES subtitle -->
  <text x="120" y="83"
        font-family="Arial, Helvetica, sans-serif"
        font-size="12"
        fill="#C89B3C"
        opacity="0.72"
        letter-spacing="6">CULTURAL GAMES</text>

  <!-- Small decorative dot at end of rule -->
  <circle cx="372" cy="67" r="2" fill="#B83232" opacity="0.7"/>
  <circle cx="118" cy="67" r="2" fill="#C89B3C" opacity="0.6"/>

</svg>
