<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Board background -->
  <rect x="2" y="2" width="60" height="60" rx="4" fill="#5C2800" stroke="#3A1400" stroke-width="1.5"/>
  <!-- Board highlight -->
  <rect x="4" y="3" width="56" height="8" rx="2" fill="#8B4513" opacity="0.30"/>

  <!-- Simplified 4x4 checkerboard (rows 0-3, cols 0-3, each cell 14px, offset 4,4) -->
  <!-- Row 0: light dark light dark -->
  <rect x="4"  y="4"  width="14" height="14" fill="#E0C070"/>
  <rect x="18" y="4"  width="14" height="14" fill="#7B3A10"/>
  <rect x="32" y="4"  width="14" height="14" fill="#E0C070"/>
  <rect x="46" y="4"  width="14" height="14" fill="#7B3A10"/>
  <!-- Row 1: dark light dark light -->
  <rect x="4"  y="18" width="14" height="14" fill="#7B3A10"/>
  <rect x="18" y="18" width="14" height="14" fill="#E0C070"/>
  <rect x="32" y="18" width="14" height="14" fill="#7B3A10"/>
  <rect x="46" y="18" width="14" height="14" fill="#E0C070"/>
  <!-- Row 2: light dark light dark -->
  <rect x="4"  y="32" width="14" height="14" fill="#E0C070"/>
  <rect x="18" y="32" width="14" height="14" fill="#7B3A10"/>
  <rect x="32" y="32" width="14" height="14" fill="#E0C070"/>
  <rect x="46" y="32" width="14" height="14" fill="#7B3A10"/>
  <!-- Row 3: dark light dark light -->
  <rect x="4"  y="46" width="14" height="14" fill="#7B3A10"/>
  <rect x="18" y="46" width="14" height="14" fill="#E0C070"/>
  <rect x="32" y="46" width="14" height="14" fill="#7B3A10"/>
  <rect x="46" y="46" width="14" height="14" fill="#E0C070"/>

  <!-- Board border -->
  <rect x="4" y="4" width="56" height="56" fill="none" stroke="#C89B3C" stroke-width="1.2"/>

  <!-- Dark pieces (red) on dark squares: (0,1),(0,3),(1,0) -->
  <circle cx="25" cy="11" r="5.5" fill="#C41E3A" stroke="#7A0020" stroke-width="1"/>
  <circle cx="53" cy="11" r="5.5" fill="#C41E3A" stroke="#7A0020" stroke-width="1"/>
  <circle cx="11" cy="25" r="5.5" fill="#C41E3A" stroke="#7A0020" stroke-width="1"/>

  <!-- Dark Dama (red with gold star) on dark square (1,2) -->
  <circle cx="39" cy="25" r="5.5" fill="#C41E3A" stroke="#7A0020" stroke-width="1"/>
  <!-- 5-point star crown -->
  <polygon points="39,21.5 40.1,24.6 43.3,24.6 40.8,26.5 41.7,29.6 39,27.8 36.3,29.6 37.2,26.5 34.7,24.6 37.9,24.6" fill="#FFD700" stroke="rgba(100,70,0,0.5)" stroke-width="0.3"/>

  <!-- Light pieces (cream) on dark squares: (2,1),(3,0),(3,2) -->
  <circle cx="25" cy="39" r="5.5" fill="#FFF0C0" stroke="#A07830" stroke-width="1"/>
  <circle cx="11" cy="53" r="5.5" fill="#FFF0C0" stroke="#A07830" stroke-width="1"/>
  <circle cx="39" cy="53" r="5.5" fill="#FFF0C0" stroke="#A07830" stroke-width="1"/>
</svg>
