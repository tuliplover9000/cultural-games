<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
  <!-- Puluc path — linear track of squares -->
  <rect x="6" y="28" width="52" height="8" rx="2" stroke-width="2"/>
  <!-- Track dividers (9 spaces) -->
  <line x1="12" y1="28" x2="12" y2="36" stroke-width="1.5"/>
  <line x1="18" y1="28" x2="18" y2="36" stroke-width="1.5"/>
  <line x1="24" y1="28" x2="24" y2="36" stroke-width="1.5"/>
  <line x1="30" y1="28" x2="30" y2="36" stroke-width="1.5"/>
  <line x1="36" y1="28" x2="36" y2="36" stroke-width="1.5"/>
  <line x1="42" y1="28" x2="42" y2="36" stroke-width="1.5"/>
  <line x1="48" y1="28" x2="48" y2="36" stroke-width="1.5"/>
  <line x1="54" y1="28" x2="54" y2="36" stroke-width="1.5"/>
  <!-- Maya stick dice (4 sticks, two above/below) -->
  <line x1="22" y1="14" x2="22" y2="24" stroke-width="3" stroke-linecap="round"/>
  <line x1="28" y1="12" x2="28" y2="24" stroke-width="3" stroke-linecap="round"/>
  <line x1="36" y1="12" x2="36" y2="24" stroke-width="3" stroke-linecap="round"/>
  <line x1="42" y1="14" x2="42" y2="24" stroke-width="3" stroke-linecap="round"/>
  <!-- Notch marks on sticks (flat side indicator) -->
  <line x1="20" y1="18" x2="24" y2="18" stroke-width="1.5"/>
  <line x1="26" y1="17" x2="30" y2="17" stroke-width="1.5"/>
  <!-- Game pieces on track -->
  <circle cx="15" cy="32" r="3.5" stroke-width="2" fill="none"/>
  <circle cx="45" cy="32" r="3.5" stroke-width="2" fill="currentColor"/>
  <!-- Arrow indicating direction -->
  <path d="M26,44 L38,44 M35,41 L38,44 L35,47" stroke-width="1.8" fill="none"/>
</svg>
