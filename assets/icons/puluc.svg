<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Puluc — track + Maya stick dice -->
  <!-- Track shadow -->
  <rect x="7" y="30" width="52" height="8" rx="3" fill="#3a2808" opacity="0.4"/>
  <!-- Track body -->
  <rect x="6" y="28" width="52" height="8" rx="3" fill="#c89040"/>
  <!-- Track cells alternating shading -->
  <rect x="6" y="28" width="6.5" height="8" rx="0" fill="#e0b060" opacity="0.4"/>
  <rect x="19" y="28" width="6.5" height="8" fill="#e0b060" opacity="0.4"/>
  <rect x="32" y="28" width="6.5" height="8" fill="#e0b060" opacity="0.4"/>
  <rect x="45" y="28" width="6.5" height="8" fill="#e0b060" opacity="0.4"/>
  <!-- Track outline -->
  <rect x="6" y="28" width="52" height="8" rx="3" fill="none" stroke="#5a3808" stroke-width="2"/>
  <!-- Track dividers -->
  <line x1="12.5" y1="28" x2="12.5" y2="36" stroke="#5a3808" stroke-width="1.2"/>
  <line x1="19" y1="28" x2="19" y2="36" stroke="#5a3808" stroke-width="1.2"/>
  <line x1="25.5" y1="28" x2="25.5" y2="36" stroke="#5a3808" stroke-width="1.2"/>
  <line x1="32" y1="28" x2="32" y2="36" stroke="#5a3808" stroke-width="1.2"/>
  <line x1="38.5" y1="28" x2="38.5" y2="36" stroke="#5a3808" stroke-width="1.2"/>
  <line x1="45" y1="28" x2="45" y2="36" stroke="#5a3808" stroke-width="1.2"/>
  <line x1="51.5" y1="28" x2="51.5" y2="36" stroke="#5a3808" stroke-width="1.2"/>
  <!-- Stick dice (4 sticks above track) — amber with flat-side mark -->
  <rect x="20" y="12" width="4" height="13" rx="2" fill="#e0b060" stroke="#5a3808" stroke-width="1.5"/>
  <rect x="27" y="10" width="4" height="14" rx="2" fill="#e0b060" stroke="#5a3808" stroke-width="1.5"/>
  <rect x="34" y="10" width="4" height="14" rx="2" fill="#e0b060" stroke="#5a3808" stroke-width="1.5"/>
  <rect x="41" y="12" width="4" height="13" rx="2" fill="#e0b060" stroke="#5a3808" stroke-width="1.5"/>
  <!-- Flat-side marks on sticks -->
  <line x1="20" y1="17" x2="24" y2="17" stroke="#5a3808" stroke-width="1.2"/>
  <line x1="27" y1="16" x2="31" y2="16" stroke="#5a3808" stroke-width="1.2"/>
  <!-- Game pieces on track — cream and gold -->
  <circle cx="15.8" cy="32" r="3.8" fill="#FBF5E6" stroke="#5a3808" stroke-width="1.8"/>
  <circle cx="47.8" cy="32" r="3.8" fill="#C89B3C" stroke="#5a3808" stroke-width="1.8"/>
  <!-- Direction arrow -->
  <path d="M24,44 L40,44" stroke="#C89B3C" stroke-width="2" stroke-linecap="round"/>
  <path d="M37,41 L40,44 L37,47" stroke="#C89B3C" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
