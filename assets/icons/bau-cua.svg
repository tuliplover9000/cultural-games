<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
  <!-- Dice cube (3D perspective) -->
  <polygon points="32,6 54,18 54,42 32,54 10,42 10,18" stroke-width="2.5" fill="none"/>
  <line x1="32" y1="6" x2="32" y2="30" stroke-width="2"/>
  <line x1="32" y1="30" x2="54" y2="18" stroke-width="2"/>
  <line x1="32" y1="30" x2="10" y2="18" stroke-width="2"/>
  <!-- Dots on top face -->
  <circle cx="26" cy="15" r="2" fill="currentColor" stroke="none"/>
  <circle cx="38" cy="15" r="2" fill="currentColor" stroke="none"/>
  <circle cx="32" cy="21" r="2" fill="currentColor" stroke="none"/>
  <!-- Dots on right face -->
  <circle cx="45" cy="27" r="1.8" fill="currentColor" stroke="none"/>
  <circle cx="45" cy="35" r="1.8" fill="currentColor" stroke="none"/>
  <!-- Crab claw motif bottom -->
  <path d="M24,48 Q20,52 18,50 Q20,46 24,46" stroke-width="2" fill="none"/>
  <path d="M40,48 Q44,52 46,50 Q44,46 40,46" stroke-width="2" fill="none"/>
