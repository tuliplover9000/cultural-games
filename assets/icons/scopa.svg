<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- back card (fanned behind) -->
  <g transform="rotate(-12 26 34)">
    <rect x="9" y="10" width="32" height="46" rx="4" fill="#F2E3C4" stroke="#5a3010" stroke-width="1.5"/>
  </g>
  <!-- front card: the settebello (7 of coins) -->
  <rect x="20" y="8" width="34" height="48" rx="4" fill="#FBF5E6" stroke="#5a3010" stroke-width="1.5"/>
  <!-- rank "7" top-left -->
  <text x="24" y="22" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#C03A2B">7</text>
  <!-- three gold coins (oros pips) -->
  <g fill="none" stroke="#C89B3C" stroke-width="1.6">
    <circle cx="31" cy="28" r="4"/>
    <circle cx="43" cy="28" r="4"/>
    <circle cx="31" cy="42" r="4"/>
    <circle cx="43" cy="42" r="4"/>
  </g>
  <circle cx="31" cy="28" r="1.4" fill="#C89B3C"/>
  <circle cx="43" cy="28" r="1.4" fill="#C89B3C"/>
  <circle cx="31" cy="42" r="1.4" fill="#C89B3C"/>
  <circle cx="43" cy="42" r="1.4" fill="#C89B3C"/>
  <!-- broom motif (scopa = broom) sweeping across the corner -->
  <g stroke="#5a3010" stroke-width="2" stroke-linecap="round">
    <line x1="50" y1="50" x2="60" y2="38"/>
  </g>
  <path d="M48 52 L54 44 L60 49 L54 57 Z" fill="#C89B3C" stroke="#5a3010" stroke-width="1.2"/>
  <path d="M49 51 L53 56 M51 49 L55 54 M53 47 L57 52" stroke="#5a3010" stroke-width="0.9"/>
</svg>
