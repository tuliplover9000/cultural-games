<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Patolli cross board — cream arms, gold center, dark border -->
  <!-- Shadow -->
  <rect x="27" y="7" width="12" height="52" rx="4" fill="#2a4a18" opacity="0.3"/>
  <rect x="7" y="27" width="52" height="12" rx="4" fill="#2a4a18" opacity="0.3"/>
  <!-- Vertical arm -->
  <rect x="26" y="6" width="12" height="52" rx="4" fill="#d4c890"/>
  <!-- Horizontal arm -->
  <rect x="6" y="26" width="52" height="12" rx="4" fill="#d4c890"/>
  <!-- Arm borders -->
  <rect x="26" y="6" width="12" height="52" rx="4" fill="none" stroke="#5a4010" stroke-width="1.8"/>
  <rect x="6" y="26" width="52" height="12" rx="4" fill="none" stroke="#5a4010" stroke-width="1.8"/>
  <!-- Center square — gold -->
  <rect x="26" y="26" width="12" height="12" fill="#C89B3C" stroke="#5a4010" stroke-width="1.5"/>
  <!-- Gold dot markers at arm ends -->
  <circle cx="32" cy="13" r="2.5" fill="#C89B3C" stroke="#5a4010" stroke-width="1"/>
  <circle cx="32" cy="51" r="2.5" fill="#C89B3C" stroke="#5a4010" stroke-width="1"/>
  <circle cx="13" cy="32" r="2.5" fill="#C89B3C" stroke="#5a4010" stroke-width="1"/>
  <circle cx="51" cy="32" r="2.5" fill="#C89B3C" stroke="#5a4010" stroke-width="1"/>
  <!-- Hollow circle markers (mid-arm) -->
  <circle cx="32" cy="20" r="2" fill="#FBF5E6" stroke="#5a4010" stroke-width="1.2"/>
  <circle cx="32" cy="44" r="2" fill="#FBF5E6" stroke="#5a4010" stroke-width="1.2"/>
  <circle cx="20" cy="32" r="2" fill="#FBF5E6" stroke="#5a4010" stroke-width="1.2"/>
  <circle cx="44" cy="32" r="2" fill="#FBF5E6" stroke="#5a4010" stroke-width="1.2"/>
  <!-- Game piece on arm -->
  <circle cx="44" cy="29" r="3.5" fill="#FBF5E6" stroke="#5a4010" stroke-width="1.8"/>
</svg>
