<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
  <!-- Patolli cross-shaped board -->
  <!-- Vertical bar -->
  <rect x="26" y="6" width="12" height="52" rx="3" stroke-width="2.5"/>
  <!-- Horizontal bar -->
  <rect x="6" y="26" width="52" height="12" rx="3" stroke-width="2.5"/>
  <!-- Center diamond -->
  <rect x="26" y="26" width="12" height="12" rx="0" fill="currentColor" stroke="none"/>
  <!-- Dot markers on arms -->
  <circle cx="32" cy="13" r="2" fill="currentColor" stroke="none"/>
  <circle cx="32" cy="51" r="2" fill="currentColor" stroke="none"/>
  <circle cx="13" cy="32" r="2" fill="currentColor" stroke="none"/>
  <circle cx="51" cy="32" r="2" fill="currentColor" stroke="none"/>
  <!-- Corner notch marks -->
  <circle cx="32" cy="20" r="1.5" stroke-width="1.5" fill="none"/>
  <circle cx="32" cy="44" r="1.5" stroke-width="1.5" fill="none"/>
  <circle cx="20" cy="32" r="1.5" stroke-width="1.5" fill="none"/>
  <circle cx="44" cy="32" r="1.5" stroke-width="1.5" fill="none"/>
  <!-- Game piece -->
  <circle cx="44" cy="29" r="3" stroke-width="2" fill="none"/>
</svg>
