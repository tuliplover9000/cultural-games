<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Ô Ăn Quan board — amber board, cream pits, gold stones -->
  <!-- Board shadow -->
  <rect x="7" y="22" width="52" height="24" rx="12" fill="#7a5020" opacity="0.4"/>
  <!-- Board body -->
  <rect x="6" y="20" width="52" height="24" rx="12" fill="#C89B3C"/>
  <!-- Board highlight strip -->
  <rect x="8" y="21" width="48" height="6" rx="6" fill="#e8bf6a" opacity="0.4"/>
  <!-- Board outline -->
  <rect x="6" y="20" width="52" height="24" rx="12" fill="none" stroke="#7a5020" stroke-width="2"/>
  <!-- Quan pits (large, cream) -->
  <circle cx="14" cy="32" r="7" fill="#FBF5E6" stroke="#9a7030" stroke-width="1.5"/>
  <circle cx="50" cy="32" r="7" fill="#FBF5E6" stroke="#9a7030" stroke-width="1.5"/>
  <!-- Small pits (cream) -->
  <circle cx="26" cy="26" r="4.5" fill="#FBF5E6" stroke="#9a7030" stroke-width="1.2"/>
  <circle cx="36" cy="26" r="4.5" fill="#FBF5E6" stroke="#9a7030" stroke-width="1.2"/>
  <circle cx="26" cy="38" r="4.5" fill="#FBF5E6" stroke="#9a7030" stroke-width="1.2"/>
  <circle cx="36" cy="38" r="4.5" fill="#FBF5E6" stroke="#9a7030" stroke-width="1.2"/>
  <!-- Gold stones in quan pit -->
  <circle cx="50" cy="30" r="1.8" fill="#C89B3C"/>
  <circle cx="50" cy="34" r="1.8" fill="#C89B3C"/>
  <circle cx="47" cy="32" r="1.8" fill="#C89B3C"/>
  <!-- Dark stone in small pit -->
  <circle cx="26" cy="26" r="1.5" fill="#7a5020"/>
  <circle cx="36" cy="38" r="1.5" fill="#7a5020"/>
</svg>
