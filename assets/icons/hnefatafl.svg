<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Board background -->
  <rect x="4" y="4" width="56" height="56" rx="4" fill="#3D3228"/>
  <!-- 3×3 grid: 16px cells, 2px gaps, 2px margin — perfectly centred in 56×56 -->
  <!-- Row 1 -->
  <rect x="6"  y="6"  width="16" height="16" rx="1" fill="#2a201a"/>
  <rect x="24" y="6"  width="16" height="16" rx="1" fill="#C4A265" opacity="0.9"/>
  <rect x="42" y="6"  width="16" height="16" rx="1" fill="#2a201a"/>
  <!-- Row 2 -->
  <rect x="6"  y="24" width="16" height="16" rx="1" fill="#C4A265" opacity="0.9"/>
  <rect x="24" y="24" width="16" height="16" rx="1" fill="#5C1A1A" opacity="0.95"/>
  <rect x="42" y="24" width="16" height="16" rx="1" fill="#C4A265" opacity="0.9"/>
  <!-- Row 3 -->
  <rect x="6"  y="42" width="16" height="16" rx="1" fill="#2a201a"/>
  <rect x="24" y="42" width="16" height="16" rx="1" fill="#C4A265" opacity="0.9"/>
  <rect x="42" y="42" width="16" height="16" rx="1" fill="#2a201a"/>
  <!-- King on throne (centre cell centred at 32,32) -->
  <circle cx="32" cy="32" r="7" fill="#D4A017" stroke="#5a3010" stroke-width="1.5"/>
  <line x1="32" y1="27" x2="32" y2="37" stroke="#5a3010" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="27" y1="32" x2="37" y2="32" stroke="#5a3010" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Attacker piece (red) in bottom-centre cell (centred at 32,50) -->
  <circle cx="32" cy="50" r="5.5" fill="#8B2020" stroke="#3a0808" stroke-width="1.2"/>
  <!-- Defender piece (bone) in right-centre cell (centred at 50,32) -->
  <circle cx="50" cy="32" r="5.5" fill="#F0E6C8" stroke="#7a5020" stroke-width="1.2"/>
</svg>
