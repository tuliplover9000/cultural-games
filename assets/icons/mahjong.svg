<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Back tile (left, fanned slightly) -->
  <g transform="rotate(-14 20 29)">
    <rect x="8" y="14" width="22" height="30" rx="3" fill="#c8a46e" stroke="#7a5020" stroke-width="1.5"/>
    <rect x="11" y="17" width="16" height="24" rx="1.5" fill="none" stroke="#b08040" stroke-width="0.8"/>
    <circle cx="19" cy="29" r="4" fill="none" stroke="#b08040" stroke-width="0.8"/>
    <circle cx="19" cy="29" r="1.5" fill="#b08040"/>
  </g>

  <!-- Front tile drop shadow -->
  <rect x="24" y="22" width="22" height="30" rx="3" fill="#1a0800" opacity="0.18"/>

  <!-- Front tile -->
  <rect x="22" y="19" width="22" height="30" rx="3" fill="#FBF5E6" stroke="#5a3010" stroke-width="2"/>
  <!-- Inner gold border -->
  <rect x="25" y="22" width="16" height="24" rx="1.5" fill="none" stroke="#C89B3C" stroke-width="1.2"/>

  <!-- 中 (Red Dragon) drawn as paths — no font needed -->
  <!-- Vertical centerline, extends above and below the box -->
  <line x1="33" y1="25" x2="33" y2="43" stroke="#cc2200" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Outer rectangle (the 口 enclosure) -->
  <rect x="27.5" y="28.5" width="11" height="10" rx="0.5" fill="none" stroke="#cc2200" stroke-width="2"/>
</svg>
