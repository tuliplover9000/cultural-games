<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <!-- Arched prawn, flat folk-print -->
  <!-- Long antennae -->
  <g fill="none" stroke="#D9543A" stroke-width="2.2" stroke-linecap="round">
    <path d="M60,26 Q72,16 70,6"/>
    <path d="M58,28 Q70,24 76,16"/>
  </g>
  <!-- Body, arched -->
  <path d="M58,30
           Q60,16 44,14
           Q26,14 20,30
           Q16,44 24,54
           Q32,64 44,60
           Q34,58 32,46
           Q32,34 46,32
           Q56,32 56,40 Z"
        fill="#3E7F8C" stroke="#2E2218" stroke-width="2.6" stroke-linejoin="round"/>
  <!-- Segment lines -->
  <g fill="none" stroke="#2E2218" stroke-width="1.8" opacity="0.75">
    <path d="M28,32 Q24,40 28,48"/>
    <path d="M34,26 Q28,38 32,52"/>
    <path d="M42,22 Q34,38 38,56"/>
  </g>
  <!-- Tail fan -->
  <path d="M44,60 Q48,72 40,72 Q36,66 38,60 Z" fill="#D9543A" stroke="#2E2218" stroke-width="2.2" stroke-linejoin="round"/>
  <path d="M44,60 Q56,68 52,72 Q46,68 44,62 Z" fill="#D9543A" stroke="#2E2218" stroke-width="2.2" stroke-linejoin="round"/>
  <!-- Little legs -->
  <g fill="none" stroke="#2E2218" stroke-width="1.8" stroke-linecap="round">
    <path d="M30,52 L26,60 M36,56 L34,64 M42,57 L42,65"/>
  </g>
  <!-- Eye -->
  <circle cx="52" cy="26" r="2.4" fill="#2E2218"/>
</svg>
