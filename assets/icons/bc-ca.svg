<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <!-- Fish — side view, facing right -->
  <!-- Tail fin -->
  <path d="M16,40 Q4,26 6,20 Q14,32 16,40 Q14,48 6,58 Q4,52 16,40 Z"
        fill="#f4913a" stroke="#c06020" stroke-width="1.5"/>
  <!-- Body -->
  <ellipse cx="44" cy="40" rx="24" ry="18" fill="#4ab0e8"/>
  <!-- Belly (lighter) -->
  <ellipse cx="44" cy="46" rx="20" ry="10" fill="#a0d8f8" opacity="0.7"/>
  <!-- Body highlight -->
  <ellipse cx="38" cy="32" rx="10" ry="6" fill="#80c8f4" opacity="0.5"/>
  <!-- Body outline -->
  <ellipse cx="44" cy="40" rx="24" ry="18" fill="none" stroke="#2a80c0" stroke-width="2"/>
  <!-- Dorsal fin -->
  <path d="M36,22 Q40,10 48,12 Q50,14 48,22" fill="#f4913a" stroke="#c06020" stroke-width="1.5"/>
  <!-- Pectoral fin -->
  <path d="M42,38 Q52,28 56,33 Q53,40 42,38 Z" fill="#f4b060" stroke="#c06020" stroke-width="1.5"/>
  <!-- Anal fin (bottom small) -->
  <path d="M40,56 Q44,64 48,58" fill="#f4913a" stroke="#c06020" stroke-width="1.5"/>
  <!-- Scale details -->
  <path d="M44,28 Q46,32 42,34" stroke="#2a80c0" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M38,30 Q40,34 36,36" stroke="#2a80c0" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M50,36 Q52,40 48,42" stroke="#2a80c0" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M42,40 Q44,44 40,46" stroke="#2a80c0" stroke-width="1.5" fill="none" opacity="0.5"/>
  <!-- Lateral line -->
  <path d="M22,38 Q40,36 62,40" stroke="#2a80c0" stroke-width="1.5" stroke-dasharray="3,3" fill="none" opacity="0.5"/>
  <!-- Eye -->
  <circle cx="60" cy="34" r="6" fill="white" stroke="#2a80c0" stroke-width="2"/>
  <circle cx="61" cy="33" r="3" fill="#1a0800"/>
  <circle cx="62" cy="32" r="1" fill="white"/>
  <!-- Mouth -->
  <path d="M68,40 Q74,38 74,40 Q74,42 68,42" stroke="#2a80c0" stroke-width="2" fill="none"/>
</svg>
