<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <!-- Carp curved mid-leap, flat folk-print -->
  <!-- Tail -->
  <path d="M58,30 Q72,18 74,24 Q68,32 70,40 Q66,46 58,42 Z" fill="#D9543A" stroke="#2E2218" stroke-width="2.4" stroke-linejoin="round"/>
  <!-- Body, arched -->
  <path d="M58,36
           Q44,20 26,26
           Q10,32 12,46
           Q14,58 30,58
           Q48,58 60,44 Z"
        fill="#8FA3AD" stroke="#2E2218" stroke-width="2.6" stroke-linejoin="round"/>
  <!-- Top dorsal fin -->
  <path d="M30,26 Q34,16 42,20 Q40,26 36,28 Z" fill="#D9543A" stroke="#2E2218" stroke-width="2" stroke-linejoin="round"/>
  <!-- Bottom fin -->
  <path d="M24,54 Q22,64 30,64 Q30,58 32,55 Z" fill="#D9543A" stroke="#2E2218" stroke-width="2" stroke-linejoin="round"/>
  <!-- Scale arcs -->
  <g fill="none" stroke="#2E2218" stroke-width="1.6" opacity="0.7">
    <path d="M28,38 Q34,44 28,50"/>
    <path d="M38,36 Q44,44 38,52"/>
    <path d="M48,38 Q53,45 48,52"/>
  </g>
  <!-- Eye -->
  <circle cx="20" cy="40" r="3.4" fill="#F0E6D2" stroke="#2E2218" stroke-width="2"/>
  <circle cx="20" cy="40" r="1.5" fill="#2E2218"/>
</svg>
