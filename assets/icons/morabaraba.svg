<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Morabaraba — three concentric squares (the "mill") with corner diagonals,
       earth-and-ochre register, two cow tokens in contrasting colours. -->
  <!-- Packed-earth board plate -->
  <rect x="4" y="4" width="56" height="56" rx="6" fill="#7A4F22" stroke="#2E1D10" stroke-width="2"/>
  <rect x="6" y="6" width="52" height="10" rx="3" fill="#9A6C34" opacity="0.35"/>

  <!-- Three concentric squares -->
  <g fill="none" stroke="#E0B05A" stroke-width="1.8">
    <rect x="10" y="10" width="44" height="44"/>
    <rect x="20" y="20" width="24" height="24"/>
    <rect x="27" y="27" width="10" height="10"/>
  </g>
  <!-- Cross arms -->
  <g stroke="#E0B05A" stroke-width="1.8">
    <line x1="32" y1="10" x2="32" y2="27"/>
    <line x1="32" y1="37" x2="32" y2="54"/>
    <line x1="10" y1="32" x2="27" y2="32"/>
    <line x1="37" y1="32" x2="54" y2="32"/>
  </g>
  <!-- Four corner diagonals (the signature) -->
  <g stroke="#E0B05A" stroke-width="1.3" opacity="0.85">
    <line x1="10" y1="10" x2="27" y2="27"/>
    <line x1="54" y1="10" x2="37" y2="27"/>
    <line x1="10" y1="54" x2="27" y2="37"/>
    <line x1="54" y1="54" x2="37" y2="37"/>
  </g>
  <!-- Point inlays at the 24 nodes -->
  <g fill="#D9A441">
    <circle cx="10" cy="10" r="1.6"/><circle cx="32" cy="10" r="1.6"/><circle cx="54" cy="10" r="1.6"/>
    <circle cx="20" cy="20" r="1.6"/><circle cx="44" cy="20" r="1.6"/>
    <circle cx="27" cy="27" r="1.6"/><circle cx="37" cy="27" r="1.6"/>
    <circle cx="10" cy="32" r="1.6"/><circle cx="20" cy="32" r="1.6"/><circle cx="44" cy="32" r="1.6"/><circle cx="54" cy="32" r="1.6"/>
    <circle cx="27" cy="37" r="1.6"/><circle cx="37" cy="37" r="1.6"/>
    <circle cx="20" cy="44" r="1.6"/><circle cx="44" cy="44" r="1.6"/>
    <circle cx="10" cy="54" r="1.6"/><circle cx="32" cy="54" r="1.6"/><circle cx="54" cy="54" r="1.6"/>
  </g>
  <!-- Light cow token (player) -->
  <circle cx="20" cy="20" r="4.4" fill="#F2E6CC" stroke="#B79A63" stroke-width="1.2"/>
  <!-- Dark cow token (opponent) -->
  <circle cx="44" cy="44" r="4.4" fill="#5B3A1E" stroke="#2C1B0C" stroke-width="1.2"/>
</svg>
