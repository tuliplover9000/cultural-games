<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Dou Shou Qi (Jungle) — a board hint: a river band crossing a parchment
       board, an enemy den, and two ranked animal tokens (red elephant 8,
       blue rat 1). Hardcoded hex fills only (no currentColor). -->
  <!-- Board plate -->
  <rect x="4" y="3" width="56" height="58" rx="6" fill="#C9A86A" stroke="#5A401E" stroke-width="2"/>

  <!-- two river ponds (left + right) with a dry centre bridge -->
  <g fill="#5D9CA8">
    <rect x="11" y="26" width="14" height="12" rx="2"/>
    <rect x="39" y="26" width="14" height="12" rx="2"/>
  </g>
  <g stroke="#3F7B86" stroke-width="0.9" opacity="0.8">
    <line x1="13" y1="30" x2="23" y2="30"/><line x1="13" y1="34" x2="23" y2="34"/>
    <line x1="41" y1="30" x2="51" y2="30"/><line x1="41" y1="34" x2="51" y2="34"/>
  </g>

  <!-- top enemy den (with a little shrine glyph) -->
  <rect x="26" y="6" width="12" height="10" rx="2" fill="#8C5A2B" stroke="#3A220E" stroke-width="1.4"/>
  <path d="M28 14 L28 10 L32 7.5 L36 10 L36 14" fill="none" stroke="#3A220E" stroke-width="1.4"/>

  <!-- red elephant token (rank 8) — top side -->
  <circle cx="20" cy="19" r="8" fill="#B23A2E" stroke="#5C160F" stroke-width="1.4"/>
  <text x="20" y="21.5" font-family="Outfit, Arial, sans-serif" font-size="9" font-weight="700"
        text-anchor="middle" fill="#FBF3DE">8</text>

  <!-- blue rat token (rank 1) — bottom side, in the dry bridge centre -->
  <circle cx="32" cy="46" r="8" fill="#2E5E8C" stroke="#11283F" stroke-width="1.4"/>
  <text x="32" y="48.5" font-family="Outfit, Arial, sans-serif" font-size="9" font-weight="700"
        text-anchor="middle" fill="#FBF3DE">1</text>

  <!-- bottom den hint -->
  <rect x="26" y="50" width="12" height="9" rx="2" fill="#8C5A2B" stroke="#3A220E" stroke-width="1.2" opacity="0.85"/>
</svg>
