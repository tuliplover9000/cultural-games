<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
  <!-- 2x2 grid of filled squares representing the core capture mechanic -->
  <!-- Top-left: filled square (player stone) -->
  <rect x="2" y="2" width="8" height="8" rx="1" fill="currentColor" opacity="0.9"/>
  <!-- Top-right: filled square (player stone) -->
  <rect x="14" y="2" width="8" height="8" rx="1" fill="currentColor" opacity="0.9"/>
  <!-- Bottom-left: filled square (player stone) -->
  <rect x="2" y="14" width="8" height="8" rx="1" fill="currentColor" opacity="0.9"/>
  <!-- Bottom-right: filled square (player stone) -->
  <rect x="14" y="14" width="8" height="8" rx="1" fill="currentColor" opacity="0.9"/>
  <!-- Center capture indicator: outlined circle showing enemy piece being captured -->
  <circle cx="12" cy="12" r="3.5" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.6"/>
  <circle cx="12" cy="12" r="1.2" fill="currentColor" opacity="0.5"/>
</svg>
