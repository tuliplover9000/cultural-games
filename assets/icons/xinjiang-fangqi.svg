<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Board surface — warm Silk Road earth tone -->
  <rect x="4" y="4" width="56" height="56" rx="5" fill="#7A4F2E" stroke="#4a2a0a" stroke-width="1.5"/>
  <!-- Board highlight -->
  <rect x="6" y="5" width="52" height="9" rx="3" fill="#c4894f" opacity="0.22"/>

  <!-- Grid lines: 4×4 visible intersections, 12px spacing, anchored at 14,26,38,50 -->
  <line x1="14" y1="14" x2="50" y2="14" stroke="#2a1005" stroke-width="1.2"/>
  <line x1="14" y1="26" x2="50" y2="26" stroke="#2a1005" stroke-width="1.2"/>
  <line x1="14" y1="38" x2="50" y2="38" stroke="#2a1005" stroke-width="1.2"/>
  <line x1="14" y1="50" x2="50" y2="50" stroke="#2a1005" stroke-width="1.2"/>
  <line x1="14" y1="14" x2="14" y2="50" stroke="#2a1005" stroke-width="1.2"/>
  <line x1="26" y1="14" x2="26" y2="50" stroke="#2a1005" stroke-width="1.2"/>
  <line x1="38" y1="14" x2="38" y2="50" stroke="#2a1005" stroke-width="1.2"/>
  <line x1="50" y1="14" x2="50" y2="50" stroke="#2a1005" stroke-width="1.2"/>

  <!-- Gold dashed square marking the 2×2 capture formation -->
  <rect x="9" y="9" width="23" height="23" rx="1" fill="none" stroke="#D4A017" stroke-width="1.6" stroke-dasharray="3,2.5"/>

  <!-- Black stones: 2×2 formation (top-left quadrant) -->
  <circle cx="14" cy="14" r="5.2" fill="#1a0a00" stroke="#6a3818" stroke-width="1"/>
  <circle cx="26" cy="14" r="5.2" fill="#1a0a00" stroke="#6a3818" stroke-width="1"/>
  <circle cx="14" cy="26" r="5.2" fill="#1a0a00" stroke="#6a3818" stroke-width="1"/>
  <circle cx="26" cy="26" r="5.2" fill="#1a0a00" stroke="#6a3818" stroke-width="1"/>

  <!-- White stone at right of formation — being captured -->
  <circle cx="38" cy="14" r="5.2" fill="#F0E6C8" stroke="#9a7030" stroke-width="1"/>
  <!-- Red X on captured stone -->
  <line x1="35" y1="11" x2="41" y2="17" stroke="#8B2020" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="41" y1="11" x2="35" y2="17" stroke="#8B2020" stroke-width="1.8" stroke-linecap="round"/>

  <!-- White stone below formation — also being captured -->
  <circle cx="14" cy="38" r="5.2" fill="#F0E6C8" stroke="#9a7030" stroke-width="1"/>
  <line x1="11" y1="35" x2="17" y2="41" stroke="#8B2020" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="17" y1="35" x2="11" y2="41" stroke="#8B2020" stroke-width="1.8" stroke-linecap="round"/>

  <!-- White stones in bottom-right for visual balance -->
  <circle cx="38" cy="38" r="5.2" fill="#F0E6C8" stroke="#9a7030" stroke-width="1"/>
  <circle cx="50" cy="50" r="5.2" fill="#F0E6C8" stroke="#9a7030" stroke-width="1"/>
</svg>
