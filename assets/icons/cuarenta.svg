<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Card back shadow -->
  <rect x="6" y="8" width="36" height="50" rx="4" fill="#1a0e06" opacity="0.25"/>
  <!-- Card face -->
  <rect x="4" y="6" width="36" height="50" rx="4" fill="#FBF5E6" stroke="#5a3010" stroke-width="1.5"/>
  <!-- Gold coin (oros) center -->
  <circle cx="22" cy="31" r="11" fill="none" stroke="#C89B3C" stroke-width="2"/>
  <circle cx="22" cy="31" r="6" fill="none" stroke="#C89B3C" stroke-width="1.5"/>
  <circle cx="22" cy="31" r="2.5" fill="#C89B3C"/>
  <!-- Rank "As" top-left -->
  <text x="8" y="17" font-family="serif" font-size="9" font-weight="bold" fill="#C89B3C">As</text>
  <!-- Suit dot top-right -->
  <circle cx="34" cy="13" r="3" fill="none" stroke="#C89B3C" stroke-width="1.5"/>
  <!-- 40 badge -->
  <rect x="34" y="38" width="26" height="18" rx="4" fill="#C89B3C"/>
  <text x="47" y="51" font-family="sans-serif" font-size="11" font-weight="bold" fill="#1a0e06" text-anchor="middle">40</text>
</svg>
