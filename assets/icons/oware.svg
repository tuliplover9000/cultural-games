<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Oware board — warm amber, cream pits, gold seeds -->
  <!-- Board shadow -->
  <rect x="5" y="20" width="56" height="28" rx="9" fill="#5a3010" opacity="0.4"/>
  <!-- Board body -->
  <rect x="4" y="18" width="56" height="28" rx="9" fill="#c07a30"/>
  <!-- Wood grain highlight -->
  <rect x="6" y="19" width="52" height="6" rx="5" fill="#e09850" opacity="0.3"/>
  <!-- Board outline -->
  <rect x="4" y="18" width="56" height="28" rx="9" fill="none" stroke="#5a3010" stroke-width="2"/>
  <!-- Top row pits (5) — cream -->
  <circle cx="13" cy="26" r="5.5" fill="#FBF5E6" stroke="#7a4a18" stroke-width="1.5"/>
  <circle cx="22" cy="26" r="5.5" fill="#FBF5E6" stroke="#7a4a18" stroke-width="1.5"/>
  <circle cx="31" cy="26" r="5.5" fill="#FBF5E6" stroke="#7a4a18" stroke-width="1.5"/>
  <circle cx="40" cy="26" r="5.5" fill="#FBF5E6" stroke="#7a4a18" stroke-width="1.5"/>
  <circle cx="49" cy="26" r="5.5" fill="#FBF5E6" stroke="#7a4a18" stroke-width="1.5"/>
  <!-- Bottom row pits (5) -->
  <circle cx="13" cy="38" r="5.5" fill="#FBF5E6" stroke="#7a4a18" stroke-width="1.5"/>
  <circle cx="22" cy="38" r="5.5" fill="#FBF5E6" stroke="#7a4a18" stroke-width="1.5"/>
  <circle cx="31" cy="38" r="5.5" fill="#FBF5E6" stroke="#7a4a18" stroke-width="1.5"/>
  <circle cx="40" cy="38" r="5.5" fill="#FBF5E6" stroke="#7a4a18" stroke-width="1.5"/>
  <circle cx="49" cy="38" r="5.5" fill="#FBF5E6" stroke="#7a4a18" stroke-width="1.5"/>
  <!-- Gold seeds in a couple pits -->
  <circle cx="13" cy="25" r="1.6" fill="#C89B3C"/>
  <circle cx="13" cy="28" r="1.6" fill="#C89B3C"/>
  <circle cx="31" cy="25" r="1.6" fill="#C89B3C"/>
  <circle cx="31" cy="28" r="1.6" fill="#C89B3C"/>
  <circle cx="34" cy="26.5" r="1.6" fill="#C89B3C"/>
</svg>
