<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <!-- Rooster — side view, facing right -->
  <!-- Tail feathers (behind body) -->
  <path d="M18,45 Q6,30 10,20" stroke="#1a6080" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M16,46 Q4,38 6,26" stroke="#2c8040" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M18,48 Q8,48 7,40" stroke="#6040a0" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- Body -->
  <ellipse cx="36" cy="50" rx="20" ry="17" fill="#c89040"/>
  <!-- Body sheen highlight -->
  <ellipse cx="30" cy="44" rx="9" ry="6" fill="#e0b060" opacity="0.5"/>
  <!-- Wing feather lines -->
  <path d="M22,46 Q36,42 50,46" stroke="#a07030" stroke-width="1.8" fill="none" opacity="0.8"/>
  <path d="M20,52 Q36,48 52,52" stroke="#a07030" stroke-width="1.8" fill="none" opacity="0.8"/>
  <!-- Body outline -->
  <ellipse cx="36" cy="50" rx="20" ry="17" fill="none" stroke="#8a6020" stroke-width="2"/>
  <!-- Neck -->
  <path d="M52,38 Q46,38 42,38 Q40,40 40,44" stroke="#a07030" stroke-width="6" fill="none" stroke-linecap="round"/>
  <path d="M52,38 Q48,44 48,48" stroke="#c89040" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- Head -->
  <circle cx="60" cy="27" r="12" fill="#c89040" stroke="#8a6020" stroke-width="2"/>
  <!-- Head highlight -->
  <circle cx="56" cy="23" r="5" fill="#e0b060" opacity="0.4"/>
  <!-- Comb (red, 3 bumps) -->
  <path d="M53,16 Q55,9 58,14 Q60,8 62,13 Q65,8 67,14 Q69,19 64,18 L53,18 Z"
        fill="#e82020" stroke="#a01010" stroke-width="1.5"/>
  <!-- Wattle -->
  <path d="M60,36 Q65,42 61,46 Q57,42 58,37 Z" fill="#e82020" stroke="#a01010" stroke-width="1.5"/>
  <!-- Beak -->
  <path d="M71,25 L78,22 L76,28 Z" fill="#f0c030" stroke="#c09020" stroke-width="1.5"/>
  <!-- Eye -->
  <circle cx="64" cy="22" r="4" fill="white" stroke="#6a4010" stroke-width="1.5"/>
  <circle cx="65" cy="22" r="2" fill="#1a0800"/>
  <circle cx="66" cy="21" r="0.8" fill="white"/>
  <!-- Legs -->
  <line x1="32" y1="67" x2="30" y2="76" stroke="#d4a030" stroke-width="3" stroke-linecap="round"/>
  <path d="M30,76 Q26,79 24,77" stroke="#d4a030" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M30,76 Q30,80 28,80" stroke="#d4a030" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <line x1="42" y1="67" x2="40" y2="76" stroke="#d4a030" stroke-width="3" stroke-linecap="round"/>
  <path d="M40,76 Q36,79 34,77" stroke="#d4a030" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M40,76 Q40,80 38,80" stroke="#d4a030" stroke-width="2.5" fill="none" stroke-linecap="round"/>
</svg>
