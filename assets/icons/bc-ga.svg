<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <!-- Strutting rooster, Dong Ho-adjacent pose, flat folk-print -->
  <!-- Sickle tail feathers -->
  <g fill="#2F6B5E" stroke="#2E2218" stroke-width="2.4" stroke-linejoin="round">
    <path d="M22,46 Q8,40 10,22 Q20,30 26,42 Z"/>
    <path d="M24,48 Q14,46 13,32 Q22,38 30,46 Z"/>
  </g>
  <!-- Legs -->
  <g fill="none" stroke="#2E2218" stroke-width="2.8" stroke-linecap="round">
    <path d="M42,60 L40,72 M40,72 L34,74 M40,72 L46,74"/>
    <path d="M52,60 L52,72 M52,72 L46,74 M52,72 L58,74"/>
  </g>
  <!-- Body -->
  <path d="M26,48 Q24,32 42,30 Q60,30 62,48 Q62,62 44,62 Q28,62 26,48 Z" fill="#E08A1E" stroke="#2E2218" stroke-width="2.6" stroke-linejoin="round"/>
  <!-- Wing -->
  <path d="M40,42 Q52,40 56,50 Q48,56 38,52 Z" fill="#C8281E" stroke="#2E2218" stroke-width="2" stroke-linejoin="round"/>
  <!-- Head -->
  <ellipse cx="58" cy="32" rx="9" ry="10" fill="#E08A1E" stroke="#2E2218" stroke-width="2.6"/>
  <!-- Comb -->
  <path d="M52,22 Q54,16 58,20 Q60,14 64,19 Q67,15 68,22 Q64,25 58,24 Z" fill="#C8281E" stroke="#2E2218" stroke-width="2" stroke-linejoin="round"/>
  <!-- Beak -->
  <path d="M66,32 L74,30 L66,36 Z" fill="#E6B83C" stroke="#2E2218" stroke-width="2" stroke-linejoin="round"/>
  <!-- Wattle -->
  <path d="M62,40 Q64,46 60,48 Q58,44 59,40 Z" fill="#C8281E" stroke="#2E2218" stroke-width="2"/>
  <!-- Eye -->
  <circle cx="59" cy="31" r="2.2" fill="#2E2218"/>
</svg>
