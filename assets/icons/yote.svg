<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Yoté — West African capture game: a piece jumping over another -->
  <!-- Sand board shadow -->
  <rect x="6" y="40" width="52" height="16" rx="6" fill="#5a3010" opacity="0.4"/>
  <!-- Sand board body -->
  <rect x="5" y="38" width="52" height="16" rx="6" fill="#c07a30"/>
  <rect x="7" y="39" width="48" height="5" rx="4" fill="#e09850" opacity="0.3"/>
  <rect x="5" y="38" width="52" height="16" rx="6" fill="none" stroke="#5a3010" stroke-width="2"/>
  <!-- Board squares (hint of grid) -->
  <line x1="22" y1="38" x2="22" y2="54" stroke="#7a4a18" stroke-width="1.2"/>
  <line x1="40" y1="38" x2="40" y2="54" stroke="#7a4a18" stroke-width="1.2"/>
  <line x1="5" y1="46" x2="57" y2="46" stroke="#7a4a18" stroke-width="1" opacity="0.6"/>
  <!-- Jump arc -->
  <path d="M16 42 Q32 8 48 42" fill="none" stroke="#C89B3C" stroke-width="2" stroke-dasharray="3 3" stroke-linecap="round"/>
  <!-- Jumped (captured) enemy piece — terracotta red, on the board -->
  <ellipse cx="32" cy="47" rx="7" ry="6.5" fill="#b03a28"/>
  <ellipse cx="32" cy="45.5" rx="5" ry="3.5" fill="#d4624c" opacity="0.6"/>
  <ellipse cx="32" cy="47" rx="7" ry="6.5" fill="none" stroke="#6e2014" stroke-width="1.5"/>
  <!-- Jumping piece — cream, mid-air over the enemy -->
  <circle cx="48" cy="20" r="9" fill="#1a0a00" opacity="0.18"/>
  <circle cx="47" cy="18" r="9" fill="#F5E6C8"/>
  <circle cx="44.5" cy="15" r="3.2" fill="#ffffff" opacity="0.5"/>
  <circle cx="47" cy="18" r="9" fill="none" stroke="#9a7030" stroke-width="2"/>
</svg>
