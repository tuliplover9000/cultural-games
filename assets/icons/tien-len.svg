<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
  <!-- Fanned playing cards -->
  <!-- Back card (leftmost) -->
  <rect x="8" y="22" width="24" height="34" rx="3" stroke-width="2"
        transform="rotate(-15 20 39)"/>
  <!-- Middle card -->
  <rect x="20" y="14" width="24" height="34" rx="3" stroke-width="2.5"
        transform="rotate(0 32 31)"/>
  <!-- Front card (rightmost) -->
  <rect x="32" y="22" width="24" height="34" rx="3" stroke-width="2"
        transform="rotate(15 44 39)"/>
  <!-- Suit on middle card -->
  <path d="M32,22 L29,28 L35,28 Z" fill="currentColor" stroke="none"/>
  <path d="M32,28 L30,32 Q32,35 34,32 Z" fill="currentColor" stroke="none"/>
</svg>
