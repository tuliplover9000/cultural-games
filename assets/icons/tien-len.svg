<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Fanned playing cards — cream with gold suit -->
  <!-- Back card -->
  <g transform="rotate(-18 20 38)">
    <rect x="8" y="16" width="24" height="36" rx="3" fill="#e8cfa0"/>
    <rect x="10" y="18" width="20" height="32" rx="2" fill="none" stroke="#C89B3C" stroke-width="1.5"/>
    <!-- Small diamond grid pattern on back card -->
    <line x1="10" y1="24" x2="30" y2="24" stroke="#C89B3C" stroke-width="0.7" opacity="0.5"/>
    <line x1="10" y1="30" x2="30" y2="30" stroke="#C89B3C" stroke-width="0.7" opacity="0.5"/>
    <line x1="10" y1="36" x2="30" y2="36" stroke="#C89B3C" stroke-width="0.7" opacity="0.5"/>
    <line x1="10" y1="42" x2="30" y2="42" stroke="#C89B3C" stroke-width="0.7" opacity="0.5"/>
  </g>
  <!-- Front card -->
  <rect x="20" y="10" width="28" height="42" rx="3" fill="#FBF5E6" stroke="#7a5020" stroke-width="1.8"/>
  <!-- Inner border -->
  <rect x="23" y="13" width="22" height="36" rx="2" fill="none" stroke="#C89B3C" stroke-width="1"/>
  <!-- Spade suit — gold -->
  <path d="M34,20 C34,20 27,27 27,31 C27,34 29.5,35 32,33.5 C31.5,35.5 31,37 29,38 L39,38 C37,37 36.5,35.5 36,33.5 C38.5,35 41,34 41,31 C41,27 34,20 34,20 Z" fill="#C89B3C"/>
  <!-- Corner rank -->
  <text x="24" y="20" font-size="7" fill="#C89B3C" font-family="Georgia,serif" font-weight="bold">A</text>
  <text x="24" y="26" font-size="6" fill="#C89B3C" font-family="Georgia,serif">♠</text>
</svg>
