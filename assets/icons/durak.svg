<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- dark lacquer rounded backdrop -->
  <rect x="2" y="2" width="60" height="60" rx="12" fill="#3a141a"/>
  <rect x="2" y="2" width="60" height="60" rx="12" fill="none" stroke="#C89B3C" stroke-width="1.4" opacity=".5"/>

  <!-- attack card (behind): a black spade -->
  <g transform="rotate(-10 26 34)">
    <rect x="11" y="14" width="30" height="42" rx="4" fill="#FBF5E6" stroke="#2b2320" stroke-width="1.6"/>
    <path d="M26 24 C34 32 37 39 30 43 C26 45.5 23 42 24 38 C23 42 20 45.5 16 43 C9 39 18 32 26 24 Z M21 50 C24 46 25 42 26 38 C27 42 28 46 31 50 Z" fill="#26221E"/>
  </g>

  <!-- defence card (front, overlapping): a red trump diamond -->
  <g transform="rotate(8 40 34)">
    <rect x="24" y="10" width="30" height="42" rx="4" fill="#FBF5E6" stroke="#2b2320" stroke-width="1.6"/>
    <rect x="26.5" y="12.5" width="25" height="37" rx="2.6" fill="none" stroke="#C89B3C" stroke-width="1.2" opacity=".6"/>
    <path d="M39 18 Q46 28 51 33 Q46 38 39 48 Q32 38 27 33 Q32 28 39 18 Z" fill="#C03A2B"/>
  </g>

  <!-- small gold trump accent -->
  <circle cx="52" cy="14" r="3.4" fill="#C89B3C"/>
</svg>
