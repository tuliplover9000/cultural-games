<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Outer background circle -->
  <circle cx="50" cy="50" r="48" fill="#0D1B3E" stroke="#C8960C" stroke-width="2"/>
  <!-- Concentric decorative rings -->
  <circle cx="50" cy="50" r="42" fill="none" stroke="#D4A017" stroke-width="1.2" opacity="0.8"/>
  <circle cx="50" cy="50" r="34" fill="none" stroke="#D4A017" stroke-width="1" opacity="0.6"/>
  <circle cx="50" cy="50" r="24" fill="#1A4A3A" stroke="#D4A017" stroke-width="1" opacity="0.7"/>
  <!-- 8-petal Mughal flower -->
  <g transform="translate(50,50)" opacity="0.75">
    <ellipse rx="8" ry="14" fill="#D4A017" transform="rotate(0)"/>
    <ellipse rx="8" ry="14" fill="#D4A017" transform="rotate(45)"/>
    <ellipse rx="8" ry="14" fill="#D4A017" transform="rotate(90)"/>
    <ellipse rx="8" ry="14" fill="#D4A017" transform="rotate(135)"/>
  </g>
  <!-- Center circle -->
  <circle cx="50" cy="50" r="10" fill="#D4A017" opacity="0.9"/>
  <circle cx="50" cy="50" r="6" fill="#0D1B3E"/>
  <!-- Small dot ornaments on outer ring -->
  <circle cx="50" cy="8"  r="2.5" fill="#D4A017" opacity="0.7"/>
  <circle cx="82" cy="18" r="2.5" fill="#D4A017" opacity="0.7"/>
  <circle cx="92" cy="50" r="2.5" fill="#D4A017" opacity="0.7"/>
  <circle cx="82" cy="82" r="2.5" fill="#D4A017" opacity="0.7"/>
  <circle cx="50" cy="92" r="2.5" fill="#D4A017" opacity="0.7"/>
  <circle cx="18" cy="82" r="2.5" fill="#D4A017" opacity="0.7"/>
  <circle cx="8"  cy="50" r="2.5" fill="#D4A017" opacity="0.7"/>
  <circle cx="18" cy="18" r="2.5" fill="#D4A017" opacity="0.7"/>
</svg>
