<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <!-- Standing stag, side profile, flat folk-print -->
  <!-- Antlers -->
  <g fill="none" stroke="#7A4A1E" stroke-width="3" stroke-linecap="round">
    <path d="M44,20 Q42,10 46,4"/>
    <path d="M44,13 L38,8"/>
    <path d="M45,9 L51,6"/>
    <path d="M52,20 Q54,10 50,4"/>
    <path d="M53,14 L59,9"/>
  </g>
  <!-- Legs -->
  <g fill="#B5722F" stroke="#2E2218" stroke-width="2.5" stroke-linejoin="round">
    <rect x="26" y="52" width="6" height="20" rx="2"/>
    <rect x="38" y="52" width="6" height="20" rx="2"/>
    <rect x="52" y="52" width="6" height="20" rx="2"/>
  </g>
  <!-- Body -->
  <path d="M22,46 Q26,36 40,36 L56,36 Q66,38 64,50 Q62,58 50,58 L30,58 Q20,56 22,46 Z" fill="#B5722F" stroke="#2E2218" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Cream belly patch -->
  <path d="M30,54 Q40,60 54,55 L52,58 Q40,62 30,57 Z" fill="#F0E6D2" stroke="none"/>
  <!-- Neck + head -->
  <path d="M52,40 Q54,28 50,22 Q46,18 42,22 Q40,30 44,40 Z" fill="#B5722F" stroke="#2E2218" stroke-width="2.5" stroke-linejoin="round"/>
  <ellipse cx="48" cy="22" rx="9" ry="7" fill="#B5722F" stroke="#2E2218" stroke-width="2.5"/>
  <!-- Ear -->
  <path d="M40,20 Q34,18 33,23 Q38,24 42,24 Z" fill="#B5722F" stroke="#2E2218" stroke-width="2"/>
  <!-- Snout + eye -->
  <path d="M52,24 Q60,24 60,28 Q56,30 51,28 Z" fill="#F0E6D2" stroke="#2E2218" stroke-width="2"/>
  <circle cx="58" cy="27" r="1.6" fill="#2E2218"/>
  <circle cx="49" cy="21" r="2.2" fill="#2E2218"/>
  <!-- Tail -->
  <path d="M22,44 Q16,42 17,48 Q21,48 24,47 Z" fill="#B5722F" stroke="#2E2218" stroke-width="2"/>
</svg>
