<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
  <!-- Gourd / Calabash — two-lobed bottle gourd -->
  <!-- Lower bulb (large) -->
  <ellipse cx="40" cy="56" rx="20" ry="18" stroke-width="3"/>
  <!-- Upper bulb (smaller) -->
  <ellipse cx="40" cy="28" rx="13" ry="12" stroke-width="3"/>
  <!-- Neck connecting them -->
  <line x1="33" y1="37" x2="31" y2="40" stroke-width="3"/>
  <line x1="47" y1="37" x2="49" y2="40" stroke-width="3"/>
  <!-- Stem at top -->
  <path d="M40,16 Q40,10 44,8" stroke-width="2.5"/>
  <!-- Leaf curl on stem -->
  <path d="M44,8 Q50,6 48,12 Q46,14 44,12" stroke-width="2" fill="none"/>
  <!-- Vertical rib lines on lower bulb -->
  <path d="M40,38 Q38,46 40,74" stroke-width="1.5" opacity="0.5" stroke-dasharray="2,3"/>
  <path d="M34,41 Q30,50 34,70" stroke-width="1.5" opacity="0.4" stroke-dasharray="2,3"/>
  <path d="M46,41 Q50,50 46,70" stroke-width="1.5" opacity="0.4" stroke-dasharray="2,3"/>
</svg>
