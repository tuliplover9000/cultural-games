<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <!-- Calabash gourd, flat folk-print -->
  <!-- Stem + tie -->
  <path d="M40,16 Q39,10 42,6" fill="none" stroke="#3E6326" stroke-width="3" stroke-linecap="round"/>
  <!-- Small leaf -->
  <path d="M42,9 Q52,4 56,11 Q49,15 42,11 Z" fill="#5E8C3A" stroke="#2E2218" stroke-width="2" stroke-linejoin="round"/>
  <path d="M44,10 Q50,9 54,11" fill="none" stroke="#3E6326" stroke-width="1.6"/>
  <!-- Gourd body: small top bulb + large bottom bulb -->
  <path d="M40,16
           Q31,17 31,27
           Q31,33 36,35
           Q24,40 24,54
           Q24,70 40,70
           Q56,70 56,54
           Q56,40 44,35
           Q49,33 49,27
           Q49,17 40,16 Z"
        fill="#5E8C3A" stroke="#2E2218" stroke-width="2.6" stroke-linejoin="round"/>
  <!-- Red tie at the waist -->
  <path d="M33,35 Q40,39 47,35 L47,38 Q40,42 33,38 Z" fill="#C8281E" stroke="#2E2218" stroke-width="1.6"/>
  <!-- Vertical dark stripe -->
  <path d="M40,42 Q38,54 40,66" fill="none" stroke="#3E6326" stroke-width="3" stroke-linecap="round"/>
  <path d="M48,44 Q50,54 47,64" fill="none" stroke="#3E6326" stroke-width="2.4" stroke-linecap="round" opacity="0.8"/>
</svg>
