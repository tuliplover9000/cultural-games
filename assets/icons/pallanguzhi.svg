<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
  <!-- Pallanguzhi board — 2 rows × 7 pits -->
  <rect x="4" y="16" width="56" height="32" rx="6" stroke-width="2.5"/>
  <!-- Top row (7 pits) -->
  <circle cx="11" cy="24" r="4" stroke-width="1.8"/>
  <circle cx="19" cy="24" r="4" stroke-width="1.8"/>
  <circle cx="27" cy="24" r="4" stroke-width="1.8"/>
  <circle cx="35" cy="24" r="4" stroke-width="1.8"/>
  <circle cx="43" cy="24" r="4" stroke-width="1.8"/>
  <circle cx="51" cy="24" r="4" stroke-width="1.8"/>
  <!-- Bottom row (7 pits) -->
  <circle cx="11" cy="40" r="4" stroke-width="1.8"/>
  <circle cx="19" cy="40" r="4" stroke-width="1.8"/>
  <circle cx="27" cy="40" r="4" stroke-width="1.8"/>
  <circle cx="35" cy="40" r="4" stroke-width="1.8"/>
  <circle cx="43" cy="40" r="4" stroke-width="1.8"/>
  <circle cx="51" cy="40" r="4" stroke-width="1.8"/>
  <!-- Cowrie shell motif (top center) -->
  <path d="M30,7 Q32,4 34,7 Q36,10 32,11 Q28,10 30,7 Z" stroke-width="1.8" fill="none"/>
  <line x1="32" y1="7" x2="32" y2="11" stroke-width="1"/>
  <!-- Seeds in a couple pits -->
  <circle cx="19" cy="39" r="1.2" fill="currentColor" stroke="none"/>
  <circle cx="19" cy="41" r="1.2" fill="currentColor" stroke="none"/>
  <circle cx="43" cy="23" r="1.2" fill="currentColor" stroke="none"/>
  <circle cx="43" cy="25" r="1.2" fill="currentColor" stroke="none"/>
  <circle cx="41" cy="24" r="1.2" fill="currentColor" stroke="none"/>
</svg>
