<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Pallanguzhi board — 2×7 pits, amber board, cream pits, gold seeds -->
  <!-- Board shadow -->
  <rect x="5" y="18" width="56" height="32" rx="7" fill="#5a3010" opacity="0.35"/>
  <!-- Board body -->
  <rect x="4" y="16" width="56" height="32" rx="7" fill="#c07830"/>
  <!-- Board highlight -->
  <rect x="6" y="17" width="52" height="7" rx="5" fill="#e0a050" opacity="0.3"/>
  <!-- Board outline -->
  <rect x="4" y="16" width="56" height="32" rx="7" fill="none" stroke="#5a3010" stroke-width="2"/>
  <!-- Center divider line -->
  <line x1="4" y1="32" x2="60" y2="32" stroke="#5a3010" stroke-width="1" opacity="0.5"/>
  <!-- Top row — 7 cream pits -->
  <circle cx="11" cy="24" r="4.5" fill="#FBF5E6" stroke="#7a4a18" stroke-width="1.5"/>
  <circle cx="19" cy="24" r="4.5" fill="#FBF5E6" stroke="#7a4a18" stroke-width="1.5"/>
  <circle cx="27" cy="24" r="4.5" fill="#FBF5E6" stroke="#7a4a18" stroke-width="1.5"/>
  <circle cx="35" cy="24" r="4.5" fill="#FBF5E6" stroke="#7a4a18" stroke-width="1.5"/>
  <circle cx="43" cy="24" r="4.5" fill="#FBF5E6" stroke="#7a4a18" stroke-width="1.5"/>
  <circle cx="51" cy="24" r="4.5" fill="#FBF5E6" stroke="#7a4a18" stroke-width="1.5"/>
  <!-- Bottom row — 7 cream pits -->
  <circle cx="11" cy="40" r="4.5" fill="#FBF5E6" stroke="#7a4a18" stroke-width="1.5"/>
  <circle cx="19" cy="40" r="4.5" fill="#FBF5E6" stroke="#7a4a18" stroke-width="1.5"/>
  <circle cx="27" cy="40" r="4.5" fill="#FBF5E6" stroke="#7a4a18" stroke-width="1.5"/>
  <circle cx="35" cy="40" r="4.5" fill="#FBF5E6" stroke="#7a4a18" stroke-width="1.5"/>
  <circle cx="43" cy="40" r="4.5" fill="#FBF5E6" stroke="#7a4a18" stroke-width="1.5"/>
  <circle cx="51" cy="40" r="4.5" fill="#FBF5E6" stroke="#7a4a18" stroke-width="1.5"/>
  <!-- Gold seeds scattered in a few pits -->
  <circle cx="19" cy="39" r="1.4" fill="#C89B3C"/>
  <circle cx="19" cy="41.5" r="1.4" fill="#C89B3C"/>
  <circle cx="43" cy="23" r="1.4" fill="#C89B3C"/>
  <circle cx="43" cy="25.5" r="1.4" fill="#C89B3C"/>
  <circle cx="41.2" cy="24" r="1.4" fill="#C89B3C"/>
  <!-- Cowrie shell on top -->
  <path d="M30,9 Q32,5 34,9 Q36,13 32,14 Q28,13 30,9 Z"
        fill="#FBF5E6" stroke="#7a4a18" stroke-width="1.5"/>
  <path d="M32,9 Q31,11 32,13" stroke="#9a7030" stroke-width="0.8" fill="none" opacity="0.7"/>
</svg>
