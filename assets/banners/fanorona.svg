<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 280">
  <!-- Fanorona banner: 5x9 lattice with diagonals, gold strong points, capture setup -->
  <defs>
    <path id="dm" d="M0 -7L7 0L0 7L-7 0Z" fill="#C89B3C"/>
    <g id="ds"><circle r="15" fill="#1a0a00" stroke="#5a3010" stroke-width="2"/><ellipse cx="-4" cy="-5" rx="5" ry="3.5" fill="#3a2a1a"/></g>
    <g id="ls"><circle r="15" fill="#F5E6C8" stroke="#9a7030" stroke-width="2"/><ellipse cx="-4" cy="-5" rx="5" ry="3.5" fill="#FFFFFF" opacity="0.7"/></g>
  </defs>
  <rect width="640" height="280" fill="#2a1606"/>
  <rect x="14" y="20" width="612" height="240" rx="12" fill="#7a5028" stroke="#3a1a05" stroke-width="4"/>
  <rect x="20" y="26" width="600" height="8" rx="4" fill="#c4894f" opacity="0.5"/>
  <rect x="20" y="246" width="600" height="6" rx="3" fill="#3a1a05" opacity="0.4"/>
  <!-- line web: orthogonals + alternating diagonals -->
  <path fill="none" stroke="#3a1a05" stroke-width="3" d="
    M40 56H600M40 98H600M40 140H600M40 182H600M40 224H600
    M40 56V224M110 56V224M180 56V224M250 56V224M320 56V224M390 56V224M460 56V224M530 56V224M600 56V224
    M40 56L320 224M180 56L460 224M320 56L600 224M460 56L600 140M40 140L180 224
    M180 56L40 140M320 56L40 224M460 56L180 224M600 56L320 224M600 140L460 224"/>
  <!-- strong-point diamonds at diagonal intersections -->
  <use href="#dm" x="40" y="56"/><use href="#dm" x="180" y="56"/><use href="#dm" x="320" y="56"/><use href="#dm" x="460" y="56"/><use href="#dm" x="600" y="56"/>
  <use href="#dm" x="110" y="98"/><use href="#dm" x="250" y="98"/><use href="#dm" x="390" y="98"/><use href="#dm" x="530" y="98"/>
  <use href="#dm" x="40" y="140"/><use href="#dm" x="180" y="140"/><use href="#dm" x="320" y="140"/><use href="#dm" x="460" y="140"/><use href="#dm" x="600" y="140"/>
  <use href="#dm" x="110" y="182"/><use href="#dm" x="250" y="182"/><use href="#dm" x="390" y="182"/><use href="#dm" x="530" y="182"/>
  <use href="#dm" x="40" y="224"/><use href="#dm" x="180" y="224"/><use href="#dm" x="320" y="224"/><use href="#dm" x="460" y="224"/><use href="#dm" x="600" y="224"/>
  <!-- dark stones, with a line of three facing the advance -->
  <use href="#ds" x="110" y="56"/><use href="#ds" x="250" y="56"/><use href="#ds" x="460" y="56"/>
  <use href="#ds" x="180" y="98"/><use href="#ds" x="530" y="98"/>
  <use href="#ds" x="390" y="140"/><use href="#ds" x="460" y="140"/><use href="#ds" x="530" y="140"/>
  <!-- light stones -->
  <use href="#ls" x="110" y="182"/><use href="#ls" x="460" y="182"/>
  <use href="#ls" x="40" y="224"/><use href="#ls" x="180" y="224"/><use href="#ls" x="320" y="224"/><use href="#ls" x="600" y="224"/>
  <!-- highlighted light stone about to advance into the dark line -->
  <use href="#ls" x="250" y="140"/>
  <circle cx="250" cy="140" r="20" fill="none" stroke="#E8C84A" stroke-width="3"/>
</svg>
