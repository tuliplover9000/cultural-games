<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 280">
  <!-- Fanorona banner: rock-carved register. Weathered granite boulder bearing a
       pecked 9x5 fanorona lattice in pale grooves, mid-game pebbles, highland light. -->
  <defs>
    <radialGradient id="lit" cx="28%" cy="22%" r="85%">
      <stop offset="0%" stop-color="#E0973E" stop-opacity="0.22"/>
      <stop offset="45%" stop-color="#E0973E" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#E0973E" stop-opacity="0"/>
    </radialGradient>
    <g id="qz"><circle r="11" fill="#EDE5D3"/><circle r="11" fill="none" stroke="#C8BFA9" stroke-width="1.5"/><ellipse cx="-3" cy="-4" rx="4" ry="2.6" fill="#FBF6E9" opacity="0.8"/></g>
    <g id="bs"><circle r="11" fill="#2F2B27"/><circle r="11" fill="none" stroke="#565048" stroke-width="1.5"/><ellipse cx="-3" cy="-4" rx="3.5" ry="2.4" fill="#6E675D" opacity="0.7"/></g>
  </defs>

  <!-- backdrop / surrounding shadow -->
  <rect width="640" height="280" fill="#3B372F"/>

  <!-- granite boulder face -->
  <path d="M22 46 Q14 130 30 226 Q150 244 330 240 Q500 244 614 224 Q624 130 610 50 Q470 32 320 38 Q150 30 22 46 Z" fill="#8C867A"/>
  <!-- weathering patches (lighter / darker) -->
  <path d="M40 60 Q150 50 300 56 Q260 110 150 120 Q70 110 40 60 Z" fill="#9A948A" opacity="0.55"/>
  <path d="M360 200 Q480 215 600 200 Q560 235 420 234 Q380 222 360 200 Z" fill="#76716A" opacity="0.5"/>
  <path d="M470 60 Q560 56 600 70 Q585 110 510 110 Q475 92 470 60 Z" fill="#7C776F" opacity="0.45"/>
  <path d="M40 180 Q120 175 180 200 Q120 226 50 214 Q38 198 40 180 Z" fill="#9A948A" opacity="0.4"/>
  <!-- lichen spots (muted sage) -->
  <circle cx="90" cy="150" r="9" fill="#8FA07A" opacity="0.45"/>
  <circle cx="100" cy="158" r="5" fill="#9FB088" opacity="0.4"/>
  <circle cx="558" cy="120" r="8" fill="#8FA07A" opacity="0.4"/>
  <circle cx="300" cy="218" r="6" fill="#97A882" opacity="0.38"/>

  <!-- sliver of laterite-red earth at lower-left edge -->
  <path d="M22 46 Q14 130 30 226 Q40 228 50 224 Q34 130 40 52 Q30 48 22 46 Z" fill="#A8432A" opacity="0.85"/>
  <path d="M30 90 Q26 150 36 210 Q42 208 44 200 Q36 150 40 96 Z" fill="#84321F" opacity="0.6"/>

  <!-- ============ pecked lattice (pale grooves), 9 cols x 5 rows ============
       col c -> x = 60 + c*65   (c = 0..8: 60,125,190,255,320,385,450,515,580)
       row r -> y = 60 + r*40   (r = 0..4: 60,100,140,180,220)
       Diagonals only through strong points where (c+r) is even. -->

  <!-- orthogonal grid: 5 horizontals + 9 verticals (slightly irregular weights) -->
  <g fill="none" stroke="#CFC8B6" stroke-linecap="round">
    <path stroke-width="3.4" d="M60 60H580"/>
    <path stroke-width="3" d="M60 100H580"/>
    <path stroke-width="3.6" d="M60 140H580"/>
    <path stroke-width="3" d="M60 180H580"/>
    <path stroke-width="3.3" d="M60 220H580"/>
    <path stroke-width="3.2" d="M60 60V220"/>
    <path stroke-width="2.9" d="M125 60V220"/>
    <path stroke-width="3.3" d="M190 60V220"/>
    <path stroke-width="3" d="M255 60V220"/>
    <path stroke-width="3.4" d="M320 60V220"/>
    <path stroke-width="3" d="M385 60V220"/>
    <path stroke-width="3.2" d="M450 60V220"/>
    <path stroke-width="2.9" d="M515 60V220"/>
    <path stroke-width="3.3" d="M580 60V220"/>
  </g>

  <!-- diagonals: each runs through strong points (c+r even). Drawn as full
       cross-diagonals spanning the board, one per diagonal band.
       "\" diagonals (top-left to bottom-right) on even bands, and the
       "/" diagonals (bottom-left to top-right), giving the alquerque-pair X
       pattern through every strong-point cell. -->
  <g fill="none" stroke="#CFC8B6" stroke-linecap="round" stroke-width="2.7">
    <!-- "\" diagonals starting along the top row at even columns -->
    <path d="M60 60L190 140L320 220"/>
    <path d="M190 60L320 140L450 220"/>
    <path d="M320 60L450 140L580 220"/>
    <!-- "\" diagonals starting along the left column (lower start) -->
    <path d="M60 140L190 220"/>
    <path d="M450 60L580 140"/>

    <!-- "/" diagonals starting along the bottom row at even columns -->
    <path d="M60 220L190 140L320 60"/>
    <path d="M190 220L320 140L450 60"/>
    <path d="M320 220L450 140L580 60"/>
    <!-- "/" diagonals partial corners -->
    <path d="M60 140L190 60"/>
    <path d="M450 220L580 140"/>
  </g>

  <!-- strong-point cuvettes (shallow rubbed hollows) at (c+r) even -->
  <g fill="#CFC8B6" opacity="0.35">
    <circle cx="60" cy="60" r="3.2"/><circle cx="190" cy="60" r="3.2"/><circle cx="320" cy="60" r="3.2"/><circle cx="450" cy="60" r="3.2"/><circle cx="580" cy="60" r="3.2"/>
    <circle cx="125" cy="100" r="3.2"/><circle cx="255" cy="100" r="3.2"/><circle cx="385" cy="100" r="3.2"/><circle cx="515" cy="100" r="3.2"/>
    <circle cx="60" cy="140" r="3.2"/><circle cx="190" cy="140" r="3.2"/><circle cx="320" cy="140" r="3.2"/><circle cx="450" cy="140" r="3.2"/><circle cx="580" cy="140" r="3.2"/>
    <circle cx="125" cy="180" r="3.2"/><circle cx="255" cy="180" r="3.2"/><circle cx="385" cy="180" r="3.2"/><circle cx="515" cy="180" r="3.2"/>
    <circle cx="60" cy="220" r="3.2"/><circle cx="190" cy="220" r="3.2"/><circle cx="320" cy="220" r="3.2"/><circle cx="450" cy="220" r="3.2"/><circle cx="580" cy="220" r="3.2"/>
  </g>

  <!-- mid-game pebble scatter ON intersections -->
  <!-- quartz (light) -->
  <use href="#qz" x="125" y="60"/>
  <use href="#qz" x="255" y="60"/>
  <use href="#qz" x="190" y="100"/>
  <use href="#qz" x="450" y="100"/>
  <use href="#qz" x="320" y="140"/>
  <use href="#qz" x="60" y="180"/>
  <use href="#qz" x="320" y="180"/>
  <!-- basalt (dark) -->
  <use href="#bs" x="385" y="60"/>
  <use href="#bs" x="320" y="100"/>
  <use href="#bs" x="580" y="100"/>
  <use href="#bs" x="190" y="140"/>
  <use href="#bs" x="515" y="140"/>
  <use href="#bs" x="450" y="180"/>
  <use href="#bs" x="255" y="220"/>
  <use href="#bs" x="515" y="220"/>

  <!-- warm highland afternoon light from upper-left -->
  <rect width="640" height="280" fill="url(#lit)"/>
</svg>
