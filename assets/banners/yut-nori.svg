<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 280">
  <defs>
    <circle id="yn" r="10" fill="#F2ECCD" stroke="#2C2C2C" stroke-width="2"/>
    <rect id="yk" x="-42" y="-6.5" width="84" height="13" rx="6.5"/>
  </defs>

  <!-- hanji-cream ground with subtle straw-mat tone at the edges -->
  <rect width="640" height="280" fill="#F2ECCD"/>
  <ellipse cx="120" cy="50" rx="190" ry="80" fill="#E4D4A8" opacity=".45"/>
  <ellipse cx="540" cy="240" rx="200" ry="90" fill="#DCC9A0" opacity=".4"/>
  <ellipse cx="560" cy="46" rx="140" ry="60" fill="#ECDFBC" opacity=".5"/>

  <!-- faint round Heaven halo behind the square -->
  <circle cx="320" cy="140" r="128" fill="none" stroke="#2C2C2C" stroke-width="2" opacity=".12"/>

  <!-- ink path lines: square loop plus the two diagonals, all one ink colour -->
  <g stroke="#2C2C2C" stroke-width="2.5" fill="none" stroke-linejoin="round" stroke-linecap="round">
    <path d="M155 55 H485 V225 H155 Z"/>
    <path d="M155 55 L485 225 M485 55 L155 225"/>
  </g>

  <!-- perimeter stations -->
  <use href="#yn" x="221" y="55"/><use href="#yn" x="287" y="55"/><use href="#yn" x="353" y="55"/><use href="#yn" x="419" y="55"/>
  <use href="#yn" x="221" y="225"/><use href="#yn" x="287" y="225"/><use href="#yn" x="419" y="225"/>
  <use href="#yn" x="155" y="89"/><use href="#yn" x="155" y="157"/><use href="#yn" x="155" y="191"/>
  <use href="#yn" x="485" y="89"/><use href="#yn" x="485" y="157"/><use href="#yn" x="485" y="191"/>
  <!-- diagonal stations -->
  <use href="#yn" x="210" y="83"/><use href="#yn" x="265" y="112"/>
  <use href="#yn" x="430" y="83"/><use href="#yn" x="375" y="112"/>
  <use href="#yn" x="210" y="197"/><use href="#yn" x="265" y="168"/>
  <use href="#yn" x="430" y="197"/><use href="#yn" x="375" y="168"/>

  <!-- shortcut-entry corners: open ink discs with a second concentric ink ring -->
  <g>
    <use href="#yn" x="155" y="55"/><circle cx="155" cy="55" r="6.2" fill="none" stroke="#2C2C2C" stroke-width="1.3" opacity=".55"/>
    <use href="#yn" x="485" y="55"/><circle cx="485" cy="55" r="6.2" fill="none" stroke="#2C2C2C" stroke-width="1.3" opacity=".55"/>
    <use href="#yn" x="155" y="225"/><circle cx="155" cy="225" r="6.2" fill="none" stroke="#2C2C2C" stroke-width="1.3" opacity=".55"/>
  </g>

  <!-- start corner: open ink disc with a thin bokjumeoni-red ring (참먹이) -->
  <g transform="translate(485 225)">
    <circle r="13" fill="#F2ECCD" stroke="#2C2C2C" stroke-width="2"/>
    <circle r="7.8" fill="none" stroke="#C8453A" stroke-width="1.6"/>
  </g>

  <!-- centre 방: open ink disc with a small North-Star yellow ring -->
  <g transform="translate(320 140)">
    <circle r="13" fill="#F2ECCD" stroke="#2C2C2C" stroke-width="2"/>
    <circle r="9.4" fill="none" stroke="#F4DC4A" stroke-width="2"/>
  </g>

  <!-- four birch yut sticks just landed: pale belly vs bark back, one with a back-do mark -->
  <g transform="translate(248 132) rotate(-25)">
    <use href="#yk" fill="#E9D9B6" stroke="#A9895C" stroke-width="2"/>
    <path d="M-32 0 H32" stroke="#C9B488" stroke-width="1.4"/>
  </g>
  <g transform="translate(272 156) rotate(-6)">
    <use href="#yk" fill="#A97E69" stroke="#5C3D2C" stroke-width="2"/>
  </g>
  <g transform="translate(392 128) rotate(16)">
    <use href="#yk" fill="#E9D9B6" stroke="#A9895C" stroke-width="2"/>
    <path d="M-32 0 H32" stroke="#C9B488" stroke-width="1.4"/>
  </g>
  <g transform="translate(372 156) rotate(36)">
    <use href="#yk" fill="#A97E69" stroke="#5C3D2C" stroke-width="2"/>
    <!-- scorched back-do mark -->
    <path d="M-5 -5 L5 5 M5 -5 L-5 5" stroke="#86534E" stroke-width="1.6" fill="none"/>
  </g>

  <!-- mal pieces: Team-red pair stacked on the bottom edge, Team-blue runners -->
  <circle cx="353" cy="226" r="12" fill="#F15A48" stroke="#C23A2A" stroke-width="3"/>
  <circle cx="353" cy="214" r="12" fill="#F15A48" stroke="#C23A2A" stroke-width="3"/>
  <circle cx="265" cy="112" r="12" fill="#465B99" stroke="#2E3F6E" stroke-width="3"/>
  <circle cx="485" cy="123" r="12" fill="#465B99" stroke="#2E3F6E" stroke-width="3"/>

  <!-- tiny bokjumeoni-tassel accent in the corner -->
  <g transform="translate(40 248)">
    <path d="M0 0 q8 -10 16 0 q-8 12 -16 0 Z" fill="#C8453A"/>
    <path d="M8 4 V18" stroke="#2E4A87" stroke-width="2.4" stroke-linecap="round"/>
  </g>
</svg>
