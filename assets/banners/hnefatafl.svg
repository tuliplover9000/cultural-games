<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 280">
  <!-- Hnefatafl banner: Ballinderry-style yew tafl board, uncheckered incised grid, arc marks,
       Borre ring-chain border, carved-head handles, dark glass defenders + amber king vs pale bone attackers -->
  <defs>
    <!-- dark blue-green glass defender dome -->
    <g id="df">
      <circle r="12" fill="#1F4A42" stroke="#0a1e1a" stroke-width="1.6"/>
      <path d="M2 8a12 12 0 0 0 9 -3" fill="none" stroke="#3E7A6C" stroke-width="1.4" opacity="0.6"/>
      <ellipse cx="-3.6" cy="-4" rx="3.6" ry="2.4" fill="#ffffff" opacity="0.45"/>
    </g>
    <!-- pale bone attacker dome -->
    <g id="at">
      <circle r="12" fill="#E9DEC6" stroke="#6B4E2E" stroke-width="1.6"/>
      <ellipse cx="-3.6" cy="-4" rx="3.8" ry="2.6" fill="#F4ECD8"/>
      <ellipse cx="-3.6" cy="-4" rx="2" ry="1.3" fill="#ffffff" opacity="0.5"/>
    </g>
    <!-- four-arc circular mark -->
    <g id="arc" fill="none" stroke="#5A3A1E" stroke-width="1.8">
      <path d="M0 -11 A11 11 0 0 1 9.5 -5.5"/>
      <path d="M11 0 A11 11 0 0 1 5.5 9.5"/>
      <path d="M0 11 A11 11 0 0 1 -9.5 5.5"/>
      <path d="M-11 0 A11 11 0 0 1 -5.5 -9.5"/>
      <circle r="1.4" fill="#5A3A1E" stroke="none"/>
    </g>
    <!-- Borre linked ring -->
    <g id="ring">
      <circle r="5.5" fill="none" stroke="#52391F" stroke-width="2.6"/>
      <circle r="5.5" cx="-0.7" cy="-0.7" fill="none" stroke="#C4A06B" stroke-width="1.1"/>
    </g>
  </defs>

  <!-- charcoal-iron surround -->
  <rect width="640" height="280" fill="#2E2A25"/>
  <!-- firelight warmth from the left -->
  <radialGradient id="fire" cx="0.12" cy="0.3" r="0.9">
    <stop offset="0" stop-color="#E09A3E" stop-opacity="0.22"/>
    <stop offset="1" stop-color="#E09A3E" stop-opacity="0"/>
  </radialGradient>
  <rect width="640" height="280" fill="url(#fire)"/>

  <!-- yew board, slightly elevated -->
  <rect x="140" y="36" width="360" height="208" rx="4" fill="#6B4E2E"/>
  <rect x="150" y="46" width="340" height="180" fill="#9C7A4E"/>
  <!-- grain streaks -->
  <g fill="#6B4E2E" opacity="0.5">
    <rect x="150" y="70"  width="340" height="3"/>
    <rect x="150" y="118" width="340" height="2"/>
    <rect x="150" y="168" width="340" height="3"/>
  </g>
  <g fill="#B8956A" opacity="0.45">
    <rect x="150" y="92"  width="340" height="2"/>
    <rect x="150" y="146" width="340" height="2"/>
  </g>

  <!-- uncheckered incised 9x9 grid suggestion -->
  <g stroke="#3D2B1A" stroke-width="1.4">
    <path d="M188 46V226M226 46V226M264 46V226M302 46V226M340 46V226M378 46V226M416 46V226M454 46V226"/>
    <path d="M150 66H490M150 86H490M150 106H490M150 126H490M150 146H490M150 166H490M150 186H490M150 206H490"/>
  </g>
  <g stroke="#B8956A" stroke-width="0.8" opacity="0.5">
    <path d="M189 46V226M341 46V226M455 46V226"/>
    <path d="M150 67H490M150 147H490M150 207H490"/>
  </g>

  <!-- arc marks: centre throne + four corners -->
  <use href="#arc" x="320" y="136"/>
  <circle cx="320" cy="136" r="6.5" fill="none" stroke="#5A3A1E" stroke-width="1.6"/>
  <use href="#arc" x="169" y="56"/>
  <use href="#arc" x="471" y="56"/>
  <use href="#arc" x="169" y="216"/>
  <use href="#arc" x="471" y="216"/>

  <!-- Borre ring-chain border band along the bottom edge -->
  <g>
    <use href="#ring" x="156" y="236"/><use href="#ring" x="170" y="236"/><use href="#ring" x="184" y="236"/>
    <use href="#ring" x="198" y="236"/><use href="#ring" x="212" y="236"/><use href="#ring" x="226" y="236"/>
    <use href="#ring" x="240" y="236"/><use href="#ring" x="254" y="236"/><use href="#ring" x="268" y="236"/>
    <use href="#ring" x="282" y="236"/><use href="#ring" x="296" y="236"/><use href="#ring" x="310" y="236"/>
    <use href="#ring" x="324" y="236"/><use href="#ring" x="338" y="236"/><use href="#ring" x="352" y="236"/>
    <use href="#ring" x="366" y="236"/><use href="#ring" x="380" y="236"/><use href="#ring" x="394" y="236"/>
    <use href="#ring" x="408" y="236"/><use href="#ring" x="422" y="236"/><use href="#ring" x="436" y="236"/>
    <use href="#ring" x="450" y="236"/><use href="#ring" x="464" y="236"/><use href="#ring" x="478" y="236"/>
  </g>

  <!-- carved-head handles protruding left and right -->
  <g fill="#6B4E2E" stroke="#3D2B1A" stroke-width="1.4">
    <path d="M140 124c-14 0-22 6-22 16s8 16 22 16c-4-8-4-24 0-32z"/>
    <path d="M500 124c14 0 22 6 22 16s-8 16-22 16c4-8 4-24 0-32z"/>
  </g>
  <g fill="none" stroke="#3D2B1A" stroke-width="1.2">
    <path d="M126 132c4 2 4 14 0 16"/>
    <path d="M514 132c-4 2-4 14 0 16"/>
  </g>

  <!-- mid-game: dark glass defenders ringing an amber king, bone attackers closing in -->
  <use href="#df" x="282" y="106"/><use href="#df" x="320" y="106"/><use href="#df" x="358" y="106"/>
  <use href="#df" x="282" y="166"/><use href="#df" x="320" y="166"/><use href="#df" x="358" y="166"/>
  <use href="#df" x="282" y="136"/><use href="#df" x="358" y="136"/>

  <use href="#at" x="226" y="86"/><use href="#at" x="416" y="86"/>
  <use href="#at" x="188" y="136"/><use href="#at" x="454" y="136"/>
  <use href="#at" x="226" y="186"/><use href="#at" x="416" y="186"/>
  <use href="#at" x="320" y="66"/><use href="#at" x="320" y="206"/>

  <!-- amber king with droplet crown, on the throne -->
  <g transform="translate(320 136)">
    <circle r="15" fill="#C8651B" stroke="#5a2c08" stroke-width="2"/>
    <circle r="15" fill="none"/>
    <ellipse cx="-5" cy="-6" rx="5" ry="3.4" fill="#F0A050" opacity="0.85"/>
    <g fill="#E9DEC6" stroke="#8F3F0C" stroke-width="0.5">
      <circle cx="0"    cy="-8.5" r="2"/>
      <circle cx="8.1"  cy="-2.6" r="2"/>
      <circle cx="5"    cy="6.9"  r="2"/>
      <circle cx="-5"   cy="6.9"  r="2"/>
      <circle cx="-8.1" cy="-2.6" r="2"/>
      <circle cx="0"    cy="0"    r="2"/>
    </g>
  </g>
</svg>
