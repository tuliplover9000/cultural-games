<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 280">
  <!-- Latrunculi: worn buff stone slab, uncheckered incised grid, glass counters blue vs tinted-white, oil-lamp glow, barracks wood -->
  <defs>
    <radialGradient id="lamp" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(40 36) scale(260)">
      <stop offset="0" stop-color="#E0A04E" stop-opacity="0.5"/>
      <stop offset="0.5" stop-color="#E0A04E" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#E0A04E" stop-opacity="0"/>
    </radialGradient>
    <!-- incised grid lines, slightly uneven -->
    <path id="gr" fill="none" d="M70 50V230M134 49V231M198 50V230M262 49V231M326 50V230M390 49V231M454 50V230M518 50V230M582 49V231M70 50H582M70 95H582M70 140H582M70 185H582M70 230H582"/>
    <!-- plano-convex glass counters -->
    <g id="bp"><circle r="17" fill="#2E7F85" stroke="#1E5A63" stroke-width="2"/><ellipse cx="-5" cy="-6" rx="6.5" ry="4.5" fill="#9FD6D2" opacity="0.85"/><circle cx="-5" cy="-6" r="2.6" fill="#FFFFFF" opacity="0.7"/></g>
    <g id="wp"><circle r="17" fill="#E6EBE0" stroke="#C2D2C8" stroke-width="2"/><ellipse cx="-5" cy="-6" rx="6.5" ry="4.5" fill="#FBFDF8" opacity="0.9"/><circle cx="-5" cy="-6" r="2.6" fill="#FFFFFF" opacity="0.85"/></g>
  </defs>

  <!-- barracks wood ground -->
  <rect width="640" height="280" fill="#5F432C"/>
  <rect width="640" height="280" fill="#000000" opacity="0.12"/>

  <!-- worn buff stone slab with chipped top-right corner -->
  <path d="M14 12H560L582 28L604 16L622 32L640 22V268H14Z" fill="#C4B69C"/>
  <!-- mottling -->
  <ellipse cx="150" cy="80" rx="100" ry="42" fill="#D8CDB4" opacity="0.5"/>
  <ellipse cx="470" cy="205" rx="115" ry="46" fill="#A89A7F" opacity="0.4"/>
  <ellipse cx="340" cy="55" rx="85" ry="28" fill="#D8CDB4" opacity="0.45"/>
  <ellipse cx="250" cy="235" rx="90" ry="26" fill="#A89A7F" opacity="0.35"/>
  <!-- chip cracks at the corner -->
  <path d="M584 30l-12 16m30-10l-10 15" stroke="#7A6E59" stroke-width="1.5" fill="none" opacity="0.7"/>

  <!-- incised grid: deep groove + light catch -->
  <use href="#gr" stroke="#5E5443" stroke-width="2.4" opacity="0.85"/>
  <use href="#gr" x="0.8" y="1" stroke="#7A6E59" stroke-width="1.3"/>
  <!-- darker intersection accents -->
  <g fill="#5E5443" opacity="0.6">
    <rect x="196" y="93" width="4" height="4"/><rect x="324" y="138" width="4" height="4"/>
    <rect x="452" y="183" width="4" height="4"/><rect x="132" y="183" width="4" height="4"/>
  </g>

  <!-- oil-lamp glow from top-left corner -->
  <rect x="14" y="12" width="626" height="256" fill="url(#lamp)"/>

  <!-- custodial capture: one blue piece flanked by two whites (centre row) -->
  <use href="#wp" x="262" y="140"/>
  <use href="#bp" x="326" y="140"/>
  <use href="#wp" x="390" y="140"/>

  <!-- surrounding mid-game arrangement -->
  <use href="#bp" x="134" y="95"/><use href="#bp" x="262" y="95"/><use href="#bp" x="518" y="95"/>
  <use href="#wp" x="198" y="185"/><use href="#wp" x="454" y="185"/><use href="#wp" x="582" y="140"/>
  <use href="#bp" x="70" y="140"/><use href="#wp" x="326" y="230"/>
</svg>
