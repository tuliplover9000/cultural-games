<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 280" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="mjfelt" cx=".5" cy=".42" r=".85">
      <stop offset="0" stop-color="#1a7838"/>
      <stop offset=".55" stop-color="#14602e"/>
      <stop offset="1" stop-color="#0a2e16"/>
    </radialGradient>
    <!-- standing tile seen from behind: back face + visible top edge -->
    <g id="mjst">
      <rect x="4" y="6" width="56" height="78" rx="7" fill="#04140a" opacity=".5"/>
      <rect width="56" height="78" rx="7" fill="#FBF5E6" stroke="#b89040" stroke-width="1.6"/>
      <path d="M0 16 Q0 4 7 4 L49 4 Q56 4 56 16 L56 18 L0 18 Z" fill="#e8dfc0"/>
      <rect x="0" y="17" width="56" height="2.4" fill="#c9b88e"/>
    </g>
    <!-- face-up tile blank -->
    <g id="mjft">
      <rect x="5" y="7" width="64" height="86" rx="8" fill="#04140a" opacity=".5"/>
      <rect width="64" height="86" rx="8" fill="#FBF5E6" stroke="#b89040" stroke-width="2"/>
      <rect x="3.5" y="3.5" width="57" height="79" rx="6" fill="none" stroke="#e8dfc0" stroke-width="2"/>
    </g>
    <!-- circle-suit pip -->
    <g id="mjdot">
      <circle r="11" fill="#165c30"/>
      <circle r="8.4" fill="#e0d4be"/>
      <circle r="5.7" fill="#0f2a5c"/>
    </g>
  </defs>

  <rect width="640" height="280" fill="url(#mjfelt)"/>

  <!-- discards: three face-up tiles -->
  <!-- red dragon (abstract frame glyph, not text) -->
  <g transform="translate(238 62) rotate(-7)">
    <use href="#mjft"/>
    <g fill="none" stroke="#c0392b" stroke-width="5">
      <line x1="32" y1="14" x2="32" y2="72"/>
      <rect x="17" y="30" width="30" height="24"/>
      <line x1="14" y1="14" x2="50" y2="14"/>
      <line x1="20" y1="72" x2="44" y2="72"/>
    </g>
  </g>
  <!-- five of circles -->
  <g transform="translate(322 78) rotate(4)">
    <use href="#mjft"/>
    <use href="#mjdot" x="18" y="22"/><use href="#mjdot" x="46" y="22"/>
    <use href="#mjdot" x="32" y="43"/>
    <use href="#mjdot" x="18" y="64"/><use href="#mjdot" x="46" y="64"/>
  </g>
  <!-- three of bamboo -->
  <g transform="translate(404 60) rotate(10)">
    <use href="#mjft"/>
    <g stroke="#1a6b3a" stroke-width="7" stroke-linecap="round">
      <line x1="32" y1="14" x2="32" y2="38"/>
      <line x1="19" y1="48" x2="19" y2="72"/>
      <line x1="45" y1="48" x2="45" y2="72"/>
    </g>
    <g stroke="#FBF5E6" stroke-width="2">
      <line x1="27" y1="26" x2="37" y2="26"/>
      <line x1="14" y1="60" x2="24" y2="60"/>
      <line x1="40" y1="60" x2="50" y2="60"/>
    </g>
  </g>

  <!-- pair of dice -->
  <g transform="translate(516 96) rotate(-12)">
    <rect x="-15" y="-12" width="34" height="34" rx="7" fill="#04140a" opacity=".45"/>
    <rect x="-17" y="-17" width="34" height="34" rx="7" fill="#FBF5E6" stroke="#c9b88e" stroke-width="1.6"/>
    <circle r="6" fill="#c0392b"/>
  </g>
  <g transform="translate(556 122) rotate(14)">
    <rect x="-15" y="-12" width="34" height="34" rx="7" fill="#04140a" opacity=".45"/>
    <rect x="-17" y="-17" width="34" height="34" rx="7" fill="#FBF5E6" stroke="#c9b88e" stroke-width="1.6"/>
    <g fill="#1a1a1a">
      <circle cx="-8" cy="-8" r="3.4"/><circle cx="8" cy="-8" r="3.4"/>
      <circle cx="-8" cy="8" r="3.4"/><circle cx="8" cy="8" r="3.4"/>
      <circle cx="0" cy="0" r="3.4"/>
    </g>
  </g>

  <!-- concealed hand: six standing tiles seen from behind-top -->
  <use href="#mjst" x="146" y="156"/>
  <use href="#mjst" x="204" y="156"/>
  <use href="#mjst" x="262" y="156"/>
  <use href="#mjst" x="320" y="156"/>
  <use href="#mjst" x="378" y="156"/>
  <use href="#mjst" x="436" y="156"/>
</svg>
