<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 280" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="mjlamp" cx=".5" cy=".4" r=".62">
      <stop offset="0" stop-color="#ffd68c" stop-opacity=".22"/>
      <stop offset=".6" stop-color="#ffd68c" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="mjfelt" cx=".5" cy=".46" r=".8">
      <stop offset="0" stop-color="#2A6E52"/>
      <stop offset=".55" stop-color="#1E5C45"/>
      <stop offset="1" stop-color="#142E24"/>
    </radialGradient>
    <linearGradient id="mjface" x1="0" y1="0" x2=".4" y2="1">
      <stop offset="0" stop-color="#FFFDF4"/>
      <stop offset=".6" stop-color="#F4EEDE"/>
      <stop offset="1" stop-color="#E9DFC6"/>
    </linearGradient>
    <linearGradient id="mjjade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#36906A"/>
      <stop offset=".55" stop-color="#2E7D5B"/>
      <stop offset="1" stop-color="#20593F"/>
    </linearGradient>
    <linearGradient id="mjjadeback" x1="0" y1="0" x2=".4" y2="1">
      <stop offset="0" stop-color="#36906A"/>
      <stop offset=".5" stop-color="#2E7D5B"/>
      <stop offset="1" stop-color="#245F46"/>
    </linearGradient>
    <!-- standing tile: ivory face + jade bottom-edge stripe -->
    <g id="mjtile">
      <rect x="5" y="8" width="64" height="96" rx="8" fill="#04140a" opacity=".45"/>
      <rect width="64" height="96" rx="8" fill="url(#mjface)" stroke="#B8AD94" stroke-width="1.6"/>
      <path d="M0 88 L64 88 L64 88 Q64 96 56 96 L8 96 Q0 96 0 88 Z" fill="url(#mjjade)"/>
      <line x1="0" y1="88" x2="64" y2="88" stroke="#20593F" stroke-width="1"/>
    </g>
  </defs>

  <!-- room -->
  <rect width="640" height="280" fill="#17211C"/>
  <!-- baize table -->
  <rect x="0" y="58" width="640" height="200" fill="url(#mjfelt)"/>
  <!-- warm lamp pool -->
  <rect x="0" y="40" width="640" height="220" fill="url(#mjlamp)"/>
  <!-- wood rails -->
  <rect x="0" y="46" width="640" height="16" fill="#5B3A24"/>
  <rect x="0" y="46" width="640" height="3" fill="#7a4e30"/>
  <rect x="0" y="242" width="640" height="16" fill="#3E2718"/>

  <!-- standing row of tiles -->
  <g transform="translate(96 96)">

    <!-- 1: 1-circle rosette -->
    <use href="#mjtile"/>
    <g transform="translate(32 44)">
      <circle cx="0" cy="0" r="13" fill="#1F7A3D"/>
      <circle cx="0" cy="-31" r="4.5" fill="#1F7A3D"/><circle cx="15.5" cy="-26.8" r="4.5" fill="#1F7A3D"/>
      <circle cx="26.8" cy="-15.5" r="4.5" fill="#1F7A3D"/><circle cx="31" cy="0" r="4.5" fill="#1F7A3D"/>
      <circle cx="26.8" cy="15.5" r="4.5" fill="#1F7A3D"/><circle cx="15.5" cy="26.8" r="4.5" fill="#1F7A3D"/>
      <circle cx="0" cy="31" r="4.5" fill="#1F7A3D"/><circle cx="-15.5" cy="26.8" r="4.5" fill="#1F7A3D"/>
      <circle cx="-26.8" cy="15.5" r="4.5" fill="#1F7A3D"/><circle cx="-31" cy="0" r="4.5" fill="#1F7A3D"/>
      <circle cx="-26.8" cy="-15.5" r="4.5" fill="#1F7A3D"/><circle cx="-15.5" cy="-26.8" r="4.5" fill="#1F7A3D"/>
      <circle cx="0" cy="0" r="26" fill="#C8281E"/>
      <circle cx="0" cy="0" r="19" fill="#F4EEDE"/>
      <circle cx="0" cy="0" r="12" fill="#2456A4"/>
      <circle cx="0" cy="0" r="5" fill="#F4EEDE"/>
      <circle cx="0" cy="0" r="26" fill="none" stroke="#3A352B" stroke-opacity=".3" stroke-width="1.5"/>
    </g>
  </g>

  <!-- 2: 3-bamboo (green sticks) -->
  <g transform="translate(172 96)">
    <use href="#mjtile"/>
    <g>
      <rect x="9"  y="16" width="13" height="56" rx="3" fill="#1b9a3d" stroke="#0a4e1e" stroke-width="1.4"/>
      <rect x="26" y="16" width="13" height="56" rx="3" fill="#1b9a3d" stroke="#0a4e1e" stroke-width="1.4"/>
      <rect x="43" y="16" width="13" height="56" rx="3" fill="#1b9a3d" stroke="#0a4e1e" stroke-width="1.4"/>
      <rect x="11" y="36" width="9" height="2" fill="#083d18"/><rect x="28" y="36" width="9" height="2" fill="#083d18"/><rect x="45" y="36" width="9" height="2" fill="#083d18"/>
      <rect x="11" y="52" width="9" height="2" fill="#083d18"/><rect x="28" y="52" width="9" height="2" fill="#083d18"/><rect x="45" y="52" width="9" height="2" fill="#083d18"/>
    </g>
  </g>

  <!-- 3: 1-bamboo sparrow -->
  <g transform="translate(248 96)">
    <use href="#mjtile"/>
    <g transform="translate(32 48) scale(0.62)">
      <ellipse cx="0" cy="0" rx="20" ry="13" fill="#2456A4"/>
      <circle cx="-17" cy="-18" r="11" fill="#1F7A3D"/>
      <polygon points="-26,-18 -18,-23 -18,-13" fill="#C8281E"/>
      <circle cx="-20" cy="-21" r="3" fill="#fff"/><circle cx="-20" cy="-21" r="1.5" fill="#111"/>
      <path d="M18 -6 C32 -24 42 -36 36 -48" stroke="#1F7A3D" stroke-width="3.5" fill="none" stroke-linecap="round"/>
      <path d="M18 -2 C38 -8 48 -12 44 -24" stroke="#C8281E" stroke-width="3" fill="none" stroke-linecap="round"/>
      <path d="M18 2 C34 10 42 20 38 34" stroke="#2456A4" stroke-width="3" fill="none" stroke-linecap="round"/>
      <line x1="-8" y1="13" x2="-12" y2="30" stroke="#7E5A2E" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="2" y1="13" x2="6" y2="30" stroke="#7E5A2E" stroke-width="2.5" stroke-linecap="round"/>
      <rect x="-20" y="32" width="40" height="4" rx="2" fill="#1F7A3D"/>
    </g>
  </g>

  <!-- 4: 5-circle quincunx (red centre) -->
  <g transform="translate(324 96)">
    <use href="#mjtile"/>
    <g>
      <g transform="translate(18 26)"><circle r="11" fill="#2456A4"/><circle r="8.1" fill="#F4EEDE"/><circle r="5" fill="#C8281E"/><circle r="2" fill="#F4EEDE"/></g>
      <g transform="translate(46 26)"><circle r="11" fill="#1F7A3D"/><circle r="8.1" fill="#F4EEDE"/><circle r="5" fill="#C8281E"/><circle r="2" fill="#F4EEDE"/></g>
      <g transform="translate(32 44)"><circle r="11" fill="#C8281E"/><circle r="8.1" fill="#F4EEDE"/><circle r="5" fill="#2456A4"/><circle r="2" fill="#F4EEDE"/></g>
      <g transform="translate(18 62)"><circle r="11" fill="#1F7A3D"/><circle r="8.1" fill="#F4EEDE"/><circle r="5" fill="#C8281E"/><circle r="2" fill="#F4EEDE"/></g>
      <g transform="translate(46 62)"><circle r="11" fill="#2456A4"/><circle r="8.1" fill="#F4EEDE"/><circle r="5" fill="#C8281E"/><circle r="2" fill="#F4EEDE"/></g>
    </g>
  </g>

  <!-- 5: white dragon hollow blue frame -->
  <g transform="translate(400 96)">
    <use href="#mjtile"/>
    <g transform="translate(32 48) scale(0.62)">
      <rect x="-18" y="-38" width="72" height="110" rx="6" transform="translate(-18 -16)" fill="none" stroke="#3A352B" stroke-opacity=".25" stroke-width="9"/>
      <rect x="-4" y="-22" width="44" height="78" rx="3" transform="translate(-18 -16)" fill="none" stroke="#3A352B" stroke-opacity=".25" stroke-width="6"/>
      <rect x="-18" y="-38" width="72" height="110" rx="6" transform="translate(-18 -16)" fill="none" stroke="#2456A4" stroke-width="7"/>
      <rect x="-4" y="-22" width="44" height="78" rx="3" transform="translate(-18 -16)" fill="none" stroke="#2456A4" stroke-width="4"/>
    </g>
  </g>

  <!-- face-down jade tile lying on the felt beside the row -->
  <g transform="translate(486 150) rotate(-14)">
    <rect x="4" y="6" width="58" height="86" rx="8" fill="#04140a" opacity=".4"/>
    <rect width="58" height="86" rx="8" fill="url(#mjjadeback)" stroke="#1F5C42" stroke-width="1.6"/>
    <rect x="6" y="6" width="46" height="20" rx="5" fill="#fff" opacity=".08"/>
  </g>

  <!-- two dice -->
  <g transform="translate(150 196)">
    <rect width="30" height="30" rx="6" fill="#FBF5E6" stroke="#cdbf9a" stroke-width="1.2"/>
    <circle cx="9" cy="9" r="3" fill="#C8281E"/><circle cx="21" cy="9" r="3" fill="#17211C"/>
    <circle cx="9" cy="21" r="3" fill="#17211C"/><circle cx="21" cy="21" r="3" fill="#C8281E"/>
    <circle cx="15" cy="15" r="3" fill="#C8281E"/>
  </g>
  <g transform="translate(192 206) rotate(12)">
    <rect width="28" height="28" rx="6" fill="#FBF5E6" stroke="#cdbf9a" stroke-width="1.2"/>
    <circle cx="14" cy="14" r="3.2" fill="#C8281E"/>
    <circle cx="7" cy="7" r="3" fill="#17211C"/><circle cx="21" cy="21" r="3" fill="#17211C"/>
  </g>
</svg>
