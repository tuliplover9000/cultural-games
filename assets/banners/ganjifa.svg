<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 280" preserveAspectRatio="xMidYMid slice">
  <!-- dark lacquer floor -->
  <rect width="640" height="280" fill="#2A1410"/>
  <rect width="640" height="280" fill="#150A06" opacity=".35"/>

  <!-- red floor-cloth sweeping across, cream-ringed -->
  <ellipse cx="320" cy="150" rx="360" ry="118" fill="#5C1F1A"/>
  <ellipse cx="320" cy="150" rx="360" ry="118" fill="none" stroke="#1A0E08" stroke-width="6"/>
  <ellipse cx="320" cy="150" rx="348" ry="108" fill="none" stroke="#C9952C" stroke-width="1.5" opacity=".85"/>

  <!-- plain maroon lacquer back disc (face-down) -->
  <g transform="translate(120 150)">
    <circle cx="5" cy="7" r="56" fill="#000000" opacity=".4"/>
    <circle r="56" fill="#6E1E14"/>
    <circle r="56" fill="none" stroke="#1A0E08" stroke-width="8"/>
    <circle r="50" fill="none" stroke="#3A140D" stroke-width="1.4"/>
    <path d="M-30 -34 A52 52 0 0 1 24 -44" fill="none" stroke="#ffffff" stroke-width="8" opacity=".10" stroke-linecap="round"/>
  </g>

  <!-- Surkh: cinnabar ground, coin pips -->
  <g transform="translate(218 162)">
    <circle cx="5" cy="7" r="56" fill="#000000" opacity=".4"/>
    <circle r="56" fill="#A8231B"/>
    <circle r="56" fill="none" stroke="#1A0E08" stroke-width="8"/>
    <circle r="50" fill="none" stroke="#C9952C" stroke-width="1.6"/>
    <circle r="47" fill="none" stroke="#F2E8CE" stroke-width="1" opacity=".8"/>
    <circle cx="-13" cy="-9" r="9" fill="#F2E8CE" stroke="#D4A437" stroke-width="1.6"/>
    <circle cx="13" cy="-9" r="9" fill="#F2E8CE" stroke="#D4A437" stroke-width="1.6"/>
    <circle cx="0" cy="11" r="9" fill="#F2E8CE" stroke="#D4A437" stroke-width="1.6"/>
    <path d="M-32 -32 A50 50 0 0 1 22 -42" fill="none" stroke="#ffffff" stroke-width="7" opacity=".10" stroke-linecap="round"/>
  </g>

  <!-- Taj: ochre ground, crown pip -->
  <g transform="translate(300 132)">
    <circle cx="5" cy="7" r="56" fill="#000000" opacity=".4"/>
    <circle r="56" fill="#D98E1F"/>
    <circle r="56" fill="none" stroke="#1A0E08" stroke-width="8"/>
    <circle r="50" fill="none" stroke="#C9952C" stroke-width="1.6"/>
    <circle r="47" fill="none" stroke="#F2E8CE" stroke-width="1" opacity=".7"/>
    <path d="M-20 14 L-20 -6 L-10 2 L0 -16 L10 2 L20 -6 L20 14 Z" fill="#241F1C" stroke="#7A1E14" stroke-width="1.8"/>
    <circle cx="-10" cy="6" r="2.4" fill="#7A1E14"/>
    <circle cx="0" cy="6" r="2.4" fill="#7A1E14"/>
    <circle cx="10" cy="6" r="2.4" fill="#7A1E14"/>
    <path d="M-32 -32 A50 50 0 0 1 22 -42" fill="none" stroke="#ffffff" stroke-width="7" opacity=".10" stroke-linecap="round"/>
  </g>

  <!-- Shamshir: leaf green ground, sword pip -->
  <g transform="translate(384 160)">
    <circle cx="5" cy="7" r="56" fill="#000000" opacity=".4"/>
    <circle r="56" fill="#3E6B35"/>
    <circle r="56" fill="none" stroke="#1A0E08" stroke-width="8"/>
    <circle r="50" fill="none" stroke="#C9952C" stroke-width="1.6"/>
    <circle r="47" fill="none" stroke="#F2E8CE" stroke-width="1" opacity=".7"/>
    <path d="M-8 24 Q-12 0 10 -24" fill="none" stroke="#F2E8CE" stroke-width="5" stroke-linecap="round"/>
    <path d="M-18 8 L18 8" stroke="#D4A437" stroke-width="4" stroke-linecap="round"/>
    <path d="M-32 -32 A50 50 0 0 1 22 -42" fill="none" stroke="#ffffff" stroke-width="7" opacity=".10" stroke-linecap="round"/>
  </g>

  <!-- Qimash: indigo-slate ground, cloth pips -->
  <g transform="translate(468 130)">
    <circle cx="5" cy="7" r="56" fill="#000000" opacity=".4"/>
    <circle r="56" fill="#33505E"/>
    <circle r="56" fill="none" stroke="#1A0E08" stroke-width="8"/>
    <circle r="50" fill="none" stroke="#C9952C" stroke-width="1.6"/>
    <circle r="47" fill="none" stroke="#F2E8CE" stroke-width="1" opacity=".7"/>
    <path d="M-22 -12 Q-8 -22 0 -12 Q8 -2 22 -12" fill="none" stroke="#F2E8CE" stroke-width="3.5"/>
    <path d="M-22 2 Q-8 -8 0 2 Q8 12 22 2" fill="none" stroke="#F2E8CE" stroke-width="3.5"/>
    <path d="M-22 16 Q-8 6 0 16 Q8 26 22 16" fill="none" stroke="#F2E8CE" stroke-width="3.5"/>
    <path d="M-32 -32 A50 50 0 0 1 22 -42" fill="none" stroke="#ffffff" stroke-width="7" opacity=".10" stroke-linecap="round"/>
  </g>

  <!-- Mir court disc: cinnabar ground, seated silhouette + canopy in cream -->
  <g transform="translate(552 164)">
    <circle cx="5" cy="7" r="56" fill="#000000" opacity=".4"/>
    <circle r="56" fill="#A8231B"/>
    <circle r="56" fill="none" stroke="#1A0E08" stroke-width="8"/>
    <circle r="50" fill="none" stroke="#C9952C" stroke-width="1.6"/>
    <circle r="45" fill="none" stroke="#C9952C" stroke-width="1.2"/>
    <!-- canopy -->
    <path d="M-26 -22 Q0 -34 26 -22" fill="none" stroke="#D4A437" stroke-width="2.6"/>
    <path d="M-23 -22 L-23 -2 M23 -22 L23 -2" stroke="#D4A437" stroke-width="2.2"/>
    <!-- seated figure -->
    <ellipse cx="0" cy="20" rx="20" ry="8" fill="#F2E8CE"/>
    <path d="M-9 16 L9 16 L13 0 L-13 0 Z" fill="#F2E8CE"/>
    <circle cx="0" cy="-8" r="8" fill="#F2E8CE"/>
    <path d="M-7 -14 L0 -24 L7 -14 Z" fill="#D4A437"/>
    <path d="M-32 -32 A50 50 0 0 1 22 -42" fill="none" stroke="#ffffff" stroke-width="7" opacity=".10" stroke-linecap="round"/>
  </g>

  <!-- conch white ground disc edging in lower-left -->
  <g transform="translate(64 226)">
    <circle cx="5" cy="7" r="50" fill="#000000" opacity=".4"/>
    <circle r="50" fill="#EFE6D0"/>
    <circle r="50" fill="none" stroke="#1A0E08" stroke-width="7"/>
    <circle r="44" fill="none" stroke="#C9952C" stroke-width="1.4"/>
    <path d="M-16 14 L16 14 L11 -14 L-11 -14 Z" fill="#241F1C" stroke="#A8231B" stroke-width="1.6"/>
    <path d="M-9 -2 L9 -2" stroke="#A8231B" stroke-width="2"/>
  </g>
</svg>
