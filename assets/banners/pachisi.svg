<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 280">
  <defs>
    <!-- stitched square trios: vertical slice of a horizontal arm -->
    <g id="ph1">
      <rect width="26" height="26" rx="2" fill="#A33B2A" stroke="#EDE6D2" stroke-width="1.3" stroke-dasharray="4 3"/>
      <rect y="28" width="26" height="26" rx="2" fill="#EDE6D2" stroke="#b89a64" stroke-width="1.3" stroke-dasharray="4 3"/>
      <rect y="56" width="26" height="26" rx="2" fill="#D9A441" stroke="#EDE6D2" stroke-width="1.3" stroke-dasharray="4 3"/>
    </g>
    <g id="ph2">
      <rect width="26" height="26" rx="2" fill="#D9A441" stroke="#EDE6D2" stroke-width="1.3" stroke-dasharray="4 3"/>
      <rect y="28" width="26" height="26" rx="2" fill="#EDE6D2" stroke="#b89a64" stroke-width="1.3" stroke-dasharray="4 3"/>
      <rect y="56" width="26" height="26" rx="2" fill="#A33B2A" stroke="#EDE6D2" stroke-width="1.3" stroke-dasharray="4 3"/>
    </g>
    <!-- horizontal slice of a vertical arm -->
    <g id="pv1">
      <rect width="26" height="26" rx="2" fill="#A33B2A" stroke="#EDE6D2" stroke-width="1.3" stroke-dasharray="4 3"/>
      <rect x="28" width="26" height="26" rx="2" fill="#EDE6D2" stroke="#b89a64" stroke-width="1.3" stroke-dasharray="4 3"/>
      <rect x="56" width="26" height="26" rx="2" fill="#D9A441" stroke="#EDE6D2" stroke-width="1.3" stroke-dasharray="4 3"/>
    </g>
    <g id="pv2">
      <rect width="26" height="26" rx="2" fill="#D9A441" stroke="#EDE6D2" stroke-width="1.3" stroke-dasharray="4 3"/>
      <rect x="28" width="26" height="26" rx="2" fill="#EDE6D2" stroke="#b89a64" stroke-width="1.3" stroke-dasharray="4 3"/>
      <rect x="56" width="26" height="26" rx="2" fill="#A33B2A" stroke="#EDE6D2" stroke-width="1.3" stroke-dasharray="4 3"/>
    </g>
    <!-- cowrie -->
    <g id="pcw">
      <ellipse rx="8" ry="5.5" fill="#EDE6D2" stroke="#c4b58f" stroke-width="1.2"/>
      <path d="M-4.5 0 H4.5" stroke="#8a7550" stroke-width="1.4" stroke-dasharray="1.6 1.4"/>
    </g>
  </defs>

  <!-- indigo cloth ground with faint weave -->
  <rect width="640" height="280" fill="#1d1830"/>
  <g stroke="#EDE6D2" stroke-width="1" opacity=".05">
    <path d="M0 30 H640 M0 90 H640 M0 150 H640 M0 210 H640 M0 268 H640"/>
  </g>

  <!-- right arm -->
  <use href="#ph1" x="363" y="99"/><use href="#ph2" x="391" y="99"/><use href="#ph1" x="419" y="99"/><use href="#ph2" x="447" y="99"/><use href="#ph1" x="475" y="99"/><use href="#ph2" x="503" y="99"/><use href="#ph1" x="531" y="99"/><use href="#ph2" x="559" y="99"/><use href="#ph1" x="587" y="99"/><use href="#ph2" x="615" y="99"/>
  <!-- left arm -->
  <use href="#ph2" x="225" y="99"/><use href="#ph1" x="197" y="99"/><use href="#ph2" x="169" y="99"/><use href="#ph1" x="141" y="99"/><use href="#ph2" x="113" y="99"/><use href="#ph1" x="85" y="99"/><use href="#ph2" x="57" y="99"/><use href="#ph1" x="29" y="99"/><use href="#ph2" x="1" y="99"/><use href="#ph1" x="-27" y="99"/>
  <!-- upper arm -->
  <use href="#pv1" x="279" y="69"/><use href="#pv2" x="279" y="41"/><use href="#pv1" x="279" y="13"/>
  <!-- lower arm -->
  <use href="#pv2" x="279" y="183"/><use href="#pv1" x="279" y="211"/><use href="#pv2" x="279" y="239"/>

  <!-- charkoni: quartered centre square -->
  <g stroke="#EDE6D2" stroke-width="1.4" stroke-dasharray="4 3">
    <path d="M279 99 H361 L320 140 Z" fill="#A33B2A"/>
    <path d="M361 99 V181 L320 140 Z" fill="#D9A441"/>
    <path d="M361 181 H279 L320 140 Z" fill="#A33B2A"/>
    <path d="M279 181 V99 L320 140 Z" fill="#D9A441"/>
  </g>
  <rect x="279" y="99" width="82" height="82" fill="none" stroke="#EDE6D2" stroke-width="2" stroke-dasharray="5 4"/>

  <!-- beehive wooden pawns at the centre -->
  <g transform="translate(302 126)">
    <path d="M-9 10 Q-11 -6 -4 -11 Q0 -14 4 -11 Q11 -6 9 10 Z" fill="#A33B2A" stroke="#5e1f15" stroke-width="2"/>
    <path d="M-9.5 2 H9.5 M-8 -5 H8" stroke="#5e1f15" stroke-width="1.4"/>
    <circle cy="-13" r="3.4" fill="#A33B2A" stroke="#5e1f15" stroke-width="2"/>
  </g>
  <g transform="translate(338 126)">
    <path d="M-9 10 Q-11 -6 -4 -11 Q0 -14 4 -11 Q11 -6 9 10 Z" fill="#D9A441" stroke="#8a6420" stroke-width="2"/>
    <path d="M-9.5 2 H9.5 M-8 -5 H8" stroke="#8a6420" stroke-width="1.4"/>
    <circle cy="-13" r="3.4" fill="#D9A441" stroke="#8a6420" stroke-width="2"/>
  </g>
  <g transform="translate(302 162)">
    <path d="M-9 10 Q-11 -6 -4 -11 Q0 -14 4 -11 Q11 -6 9 10 Z" fill="#3F6B4F" stroke="#1f3a28" stroke-width="2"/>
    <path d="M-9.5 2 H9.5 M-8 -5 H8" stroke="#1f3a28" stroke-width="1.4"/>
    <circle cy="-13" r="3.4" fill="#3F6B4F" stroke="#1f3a28" stroke-width="2"/>
  </g>
  <g transform="translate(338 162)">
    <path d="M-9 10 Q-11 -6 -4 -11 Q0 -14 4 -11 Q11 -6 9 10 Z" fill="#3C4E7A" stroke="#1d2a48" stroke-width="2"/>
    <path d="M-9.5 2 H9.5 M-8 -5 H8" stroke="#1d2a48" stroke-width="1.4"/>
    <circle cy="-13" r="3.4" fill="#3C4E7A" stroke="#1d2a48" stroke-width="2"/>
  </g>

  <!-- six cowrie shells thrown near the right arm -->
  <g transform="translate(430 205) rotate(-15)"><use href="#pcw"/></g>
  <g transform="translate(460 215) rotate(20)"><use href="#pcw"/></g>
  <g transform="translate(490 200) rotate(-30)"><use href="#pcw"/></g>
  <g transform="translate(444 230) rotate(8)"><use href="#pcw"/></g>
  <g transform="translate(478 232) rotate(-12)"><use href="#pcw"/></g>
  <g transform="translate(514 222) rotate(32)"><use href="#pcw"/></g>
</svg>
