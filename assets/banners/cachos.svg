<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 280" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="calamp" cx=".5" cy=".42" r=".7">
      <stop offset="0" stop-color="#54331E"/>
      <stop offset="1" stop-color="#3B2417"/>
    </radialGradient>
    <radialGradient id="capool" cx=".42" cy=".5" r=".55">
      <stop offset="0" stop-color="#D98E2B" stop-opacity=".28"/>
      <stop offset="1" stop-color="#D98E2B" stop-opacity="0"/>
    </radialGradient>
    <!-- bone die blank, 64x64 centered at 0,0 -->
    <g id="cadie">
      <rect x="-30" y="-29" width="64" height="64" rx="11" fill="#140B06" opacity=".4"/>
      <rect x="-32" y="-32" width="64" height="64" rx="11" fill="#F4EDDC" stroke="#D9CCAE" stroke-width="2"/>
    </g>
  </defs>

  <!-- dark walnut bar table -->
  <rect width="640" height="280" fill="url(#calamp)"/>
  <!-- plank seams -->
  <g stroke="#140B06" stroke-width="2" opacity=".8">
    <line x1="0" y1="92" x2="640" y2="92"/>
    <line x1="0" y1="196" x2="640" y2="196"/>
  </g>
  <g fill="#54331E" opacity=".16">
    <rect x="80" y="0" width="3" height="280"/>
    <rect x="300" y="0" width="2" height="280"/>
    <rect x="520" y="0" width="3" height="280"/>
  </g>
  <!-- warm amber lamp pool -->
  <ellipse cx="270" cy="140" rx="340" ry="150" fill="url(#capool)"/>
  <!-- bottom vignette -->
  <rect y="210" width="640" height="70" fill="#0C0704" opacity=".45"/>

  <!-- aguayo stripe along bottom edge -->
  <g opacity=".88">
    <rect y="266" width="640" height="14" fill="#3B2417"/>
    <rect x="0"   y="268" width="640" height="10" fill="#C2186B"/>
    <g>
      <rect x="22"  y="268" width="20" height="10" fill="#E2711D"/>
      <rect x="78"  y="268" width="20" height="10" fill="#2E8B57"/>
      <rect x="134" y="268" width="20" height="10" fill="#E2711D"/>
      <rect x="190" y="268" width="20" height="10" fill="#2E8B57"/>
      <rect x="246" y="268" width="20" height="10" fill="#E2711D"/>
      <rect x="302" y="268" width="20" height="10" fill="#2E8B57"/>
      <rect x="358" y="268" width="20" height="10" fill="#E2711D"/>
      <rect x="414" y="268" width="20" height="10" fill="#2E8B57"/>
      <rect x="470" y="268" width="20" height="10" fill="#E2711D"/>
      <rect x="526" y="268" width="20" height="10" fill="#2E8B57"/>
      <rect x="582" y="268" width="20" height="10" fill="#E2711D"/>
    </g>
  </g>

  <!-- tooled tan-leather cup, mouth-DOWN mid-reveal -->
  <g transform="translate(168 150)">
    <ellipse cx="0" cy="66" rx="54" ry="14" fill="#0C0704" opacity=".5"/>
    <!-- body (tapered, mouth at bottom) -->
    <path d="M-40 -52 Q-58 -52 -54 -40 L-44 56 Q-43 66 0 66 Q43 66 44 56 L54 -40 Q58 -52 40 -52 Z" fill="#A9692F" stroke="#6B3F1D" stroke-width="3"/>
    <!-- burnish highlight -->
    <path d="M-38 -50 Q-52 -50 -49 -40 L-42 50 Q-41 58 -22 62 L-30 -50 Z" fill="#C98B4B" opacity=".35"/>
    <!-- saddle stitching -->
    <line x1="-50" y1="-30" x2="50" y2="-30" stroke="#E8D5A8" stroke-width="2.2" stroke-dasharray="2.5 5"/>
    <line x1="-46" y1="46" x2="46" y2="46" stroke="#E8D5A8" stroke-width="2.2" stroke-dasharray="2.5 5"/>
    <!-- embossed llama suggestion -->
    <path d="M-18 26 L-18 -2 Q-18 -10 -10 -12 L-10 -26 Q-10 -32 -4 -32 Q2 -32 2 -26 L2 -12 Q14 -10 18 -2 L18 26 M2 -12 L2 26 M8 -10 L14 -24" fill="none" stroke="#C98B4B" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round"/>
    <!-- mouth rim (bottom, partly hidden) -->
    <ellipse cx="0" cy="66" rx="44" ry="11" fill="#6B3F1D" stroke="#4A2A12" stroke-width="3"/>
    <ellipse cx="0" cy="66" rx="44" ry="11" fill="none" stroke="#C98B4B" stroke-width="1.6" opacity=".7"/>
  </g>

  <!-- spilled bone dice -->
  <!-- five (quina) -->
  <g transform="translate(300 152) rotate(-8)">
    <use href="#cadie"/>
    <g fill="#1C1B18">
      <circle cx="-15" cy="-15" r="6"/><circle cx="15" cy="-15" r="6"/>
      <circle cx="0" cy="0" r="6"/>
      <circle cx="-15" cy="15" r="6"/><circle cx="15" cy="15" r="6"/>
    </g>
  </g>
  <!-- amber ace -->
  <g transform="translate(388 192) rotate(13)">
    <use href="#cadie"/>
    <circle r="9" fill="#D98E2B" stroke="#A86A22" stroke-width="2"/>
  </g>
  <!-- three (tren) -->
  <g transform="translate(470 134) rotate(4)">
    <use href="#cadie"/>
    <g fill="#1C1B18">
      <circle cx="-15" cy="-15" r="6"/><circle cx="0" cy="0" r="6"/><circle cx="15" cy="15" r="6"/>
    </g>
  </g>
  <!-- six (sena) -->
  <g transform="translate(556 190) rotate(-15)">
    <use href="#cadie"/>
    <g fill="#1C1B18">
      <circle cx="-14" cy="-16" r="6"/><circle cx="14" cy="-16" r="6"/>
      <circle cx="-14" cy="0" r="6"/><circle cx="14" cy="0" r="6"/>
      <circle cx="-14" cy="16" r="6"/><circle cx="14" cy="16" r="6"/>
    </g>
  </g>
  <!-- one die mid-tumble on a corner -->
  <g transform="translate(528 84) rotate(38)">
    <rect x="-28" y="-26" width="56" height="56" rx="10" fill="#140B06" opacity=".35"/>
    <rect x="-28" y="-28" width="56" height="56" rx="10" fill="#F4EDDC" stroke="#D9CCAE" stroke-width="2"/>
    <g fill="#1C1B18">
      <circle cx="-12" cy="-12" r="5.4"/><circle cx="12" cy="12" r="5.4"/>
    </g>
  </g>
</svg>
