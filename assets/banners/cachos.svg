<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 280" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="cafelt" cx=".5" cy=".45" r=".8">
      <stop offset="0" stop-color="#236040"/>
      <stop offset="1" stop-color="#16402a"/>
    </radialGradient>
    <!-- ivory die blank, 64x64 centered -->
    <g id="cadie">
      <rect x="-37" y="-29" width="64" height="64" rx="11" fill="#1a0d05" opacity=".35"/>
      <rect x="-32" y="-32" width="64" height="64" rx="11" fill="#F5EDD6" stroke="#c9b88e" stroke-width="2"/>
    </g>
  </defs>

  <rect width="640" height="280" fill="url(#cafelt)"/>
  <!-- felt sheen bands, full-bleed crop-safe -->
  <rect y="54" width="640" height="3" fill="#2a7a50" opacity=".25"/>
  <rect y="232" width="640" height="3" fill="#0e3320" opacity=".4"/>

  <!-- leather dice cup tipped on its side, mouth to the right -->
  <g transform="translate(150 142) rotate(96)">
    <ellipse cx="6" cy="40" rx="44" ry="58" fill="#0e2a1c" opacity=".5"/>
    <!-- body -->
    <path d="M-34 -44 Q-37 -44 -36 -36 L-26 38 Q-25 50 0 50 Q25 50 26 38 L36 -36 Q37 -44 34 -44 Z" fill="#7A3B10" stroke="#4A2000" stroke-width="3"/>
    <path d="M-30 -20 L30 -20 M-28 2 L28 2 M-26 22 L26 22" stroke="#5C2E00" stroke-width="2" opacity=".55" fill="none"/>
    <!-- mouth -->
    <ellipse cx="0" cy="-44" rx="35" ry="10" fill="#3a1a02" stroke="#4A2000" stroke-width="3"/>
    <ellipse cx="0" cy="-44" rx="35" ry="10" fill="none" stroke="#A0522D" stroke-width="2" opacity=".7"/>
    <!-- stitched rim band -->
    <path d="M-36 -36 Q0 -26 36 -36" fill="none" stroke="#A0522D" stroke-width="6"/>
    <g stroke="#F5EDD6" stroke-width="1.6" opacity=".75">
      <line x1="-28" y1="-36" x2="-24" y2="-32"/><line x1="-16" y1="-33" x2="-12" y2="-29"/>
      <line x1="-3" y1="-32" x2="1" y2="-28"/><line x1="10" y1="-33" x2="14" y2="-29"/>
      <line x1="23" y1="-36" x2="27" y2="-32"/>
    </g>
  </g>

  <!-- spilled dice -->
  <!-- five (quina) -->
  <g transform="translate(286 150) rotate(-8)">
    <use href="#cadie"/>
    <g fill="#2C1810">
      <circle cx="-15" cy="-15" r="6"/><circle cx="15" cy="-15" r="6"/>
      <circle cx="0" cy="0" r="6"/>
      <circle cx="-15" cy="15" r="6"/><circle cx="15" cy="15" r="6"/>
    </g>
  </g>
  <!-- gold ace -->
  <g transform="translate(372 190) rotate(13)">
    <use href="#cadie"/>
    <circle r="9" fill="#C8960A" stroke="#8a6010" stroke-width="2"/>
  </g>
  <!-- three (tren) -->
  <g transform="translate(452 132) rotate(4)">
    <use href="#cadie"/>
    <g fill="#2C1810">
      <circle cx="-15" cy="-15" r="6"/><circle cx="0" cy="0" r="6"/><circle cx="15" cy="15" r="6"/>
    </g>
  </g>
  <!-- six (cuadra+) -->
  <g transform="translate(540 188) rotate(-15)">
    <use href="#cadie"/>
    <g fill="#2C1810">
      <circle cx="-14" cy="-16" r="6"/><circle cx="14" cy="-16" r="6"/>
      <circle cx="-14" cy="0" r="6"/><circle cx="14" cy="0" r="6"/>
      <circle cx="-14" cy="16" r="6"/><circle cx="14" cy="16" r="6"/>
    </g>
  </g>
  <!-- one die still mid-tumble, up on a corner -->
  <g transform="translate(512 86) rotate(38)">
    <rect x="-30" y="-26" width="56" height="56" rx="10" fill="#1a0d05" opacity=".3"/>
    <rect x="-28" y="-28" width="56" height="56" rx="10" fill="#EDE3C8" stroke="#c9b88e" stroke-width="2"/>
    <g fill="#2C1810">
      <circle cx="-12" cy="-12" r="5.4"/><circle cx="12" cy="12" r="5.4"/>
    </g>
  </g>
</svg>
