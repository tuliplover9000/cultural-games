<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 280" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- goat token -->
    <g id="bcgoat">
      <circle r="13" fill="#EDE3C8" stroke="#A98C58" stroke-width="2.4"/>
      <path d="M-4 -6 A6 6 0 0 1 -9 -2 M4 -6 A6 6 0 0 0 9 -2" fill="none" stroke="#8A7048" stroke-width="2.2" stroke-linecap="round"/>
    </g>
    <!-- tiger token -->
    <g id="bctiger">
      <circle r="17" fill="#C8822C" stroke="#7A4818" stroke-width="2.6"/>
      <circle cx="-9" cy="-12" r="5" fill="#C8822C" stroke="#7A4818" stroke-width="2"/>
      <circle cx="9" cy="-12" r="5" fill="#C8822C" stroke="#7A4818" stroke-width="2"/>
      <path d="M-8 -14 L-6 16 M0 -16 L0 17 M8 -14 L6 16" stroke="#3A2410" stroke-width="2.6" fill="none"/>
    </g>
  </defs>

  <!-- dark wood surround -->
  <rect width="640" height="280" fill="#3A2616"/>
  <rect y="60" width="640" height="3" fill="#2A1B0F" opacity=".7"/>
  <rect y="214" width="640" height="3" fill="#2A1B0F" opacity=".7"/>
  <rect x="70" y="120" width="200" height="5" rx="2.5" fill="#5E3A1C" opacity=".5"/>
  <rect x="430" y="180" width="150" height="5" rx="2.5" fill="#5E3A1C" opacity=".5"/>

  <!-- brass-on-wood board plate, centred -->
  <rect x="216" y="20" width="208" height="208" rx="14" fill="#7A5024" stroke="#3A2616" stroke-width="4"/>
  <rect x="222" y="26" width="196" height="40" rx="8" fill="#9A6A34" opacity=".3"/>

  <!-- 5x5 brass grid (points at x=240..400, y=44..204, step 40) -->
  <g stroke="#D9A441" stroke-width="2.2">
    <line x1="240" y1="44"  x2="400" y2="44"/>
    <line x1="240" y1="84"  x2="400" y2="84"/>
    <line x1="240" y1="124" x2="400" y2="124"/>
    <line x1="240" y1="164" x2="400" y2="164"/>
    <line x1="240" y1="204" x2="400" y2="204"/>
    <line x1="240" y1="44" x2="240" y2="204"/>
    <line x1="280" y1="44" x2="280" y2="204"/>
    <line x1="320" y1="44" x2="320" y2="204"/>
    <line x1="360" y1="44" x2="360" y2="204"/>
    <line x1="400" y1="44" x2="400" y2="204"/>
  </g>
  <!-- diagonals at strong points (the alquerque X's) -->
  <g stroke="#D9A441" stroke-width="1.4" opacity=".7">
    <line x1="240" y1="44"  x2="400" y2="204"/>
    <line x1="400" y1="44"  x2="240" y2="204"/>
    <line x1="320" y1="44"  x2="240" y2="124"/>
    <line x1="320" y1="44"  x2="400" y2="124"/>
    <line x1="240" y1="124" x2="320" y2="204"/>
    <line x1="400" y1="124" x2="320" y2="204"/>
  </g>
  <!-- brass point inlays -->
  <g fill="#E8C06A">
    <circle cx="240" cy="44" r="3"/><circle cx="320" cy="44" r="3"/><circle cx="400" cy="44" r="3"/>
    <circle cx="280" cy="84" r="3"/><circle cx="360" cy="84" r="3"/>
    <circle cx="240" cy="124" r="3"/><circle cx="320" cy="124" r="3"/><circle cx="400" cy="124" r="3"/>
    <circle cx="280" cy="164" r="3"/><circle cx="360" cy="164" r="3"/>
    <circle cx="240" cy="204" r="3"/><circle cx="320" cy="204" r="3"/><circle cx="400" cy="204" r="3"/>
  </g>

  <!-- four tigers on the corners -->
  <use href="#bctiger" x="240" y="44"/>
  <use href="#bctiger" x="400" y="44"/>
  <use href="#bctiger" x="240" y="204"/>
  <use href="#bctiger" x="400" y="204"/>

  <!-- goats clustering in -->
  <use href="#bcgoat" x="320" y="124"/>
  <use href="#bcgoat" x="280" y="84"/>
  <use href="#bcgoat" x="360" y="164"/>
  <use href="#bcgoat" x="360" y="84"/>
  <use href="#bcgoat" x="280" y="164"/>

  <!-- a few off-board goats waiting in hand, left side -->
  <use href="#bcgoat" x="120" y="150"/>
  <use href="#bcgoat" x="150" y="170"/>
  <use href="#bcgoat" x="96" y="178"/>

  <!-- a lone tiger prowling, right side -->
  <use href="#bctiger" x="510" y="120"/>
</svg>
