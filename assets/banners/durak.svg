<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 280" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- card-back khokhloma weave -->
    <pattern id="dkback" width="20" height="20" patternUnits="userSpaceOnUse">
      <rect width="20" height="20" fill="#7a1d22"/>
      <path d="M0 20 L20 0 M-4 4 L4 -4 M16 24 L24 16" stroke="#E8C878" stroke-width="1.5" opacity=".45" fill="none"/>
      <circle cx="10" cy="10" r="2" fill="#E8C878" opacity=".4"/>
    </pattern>
    <radialGradient id="dkvig" cx="50%" cy="54%" r="62%">
      <stop offset="46%" stop-color="#3a141a" stop-opacity="0"/>
      <stop offset="100%" stop-color="#120608" stop-opacity="0.7"/>
    </radialGradient>
  </defs>

  <!-- deep lacquer table -->
  <rect width="640" height="280" fill="#2a1014"/>
  <rect width="640" height="280" fill="url(#dkvig)"/>

  <!-- gold inset ring -->
  <rect x="22" y="22" width="596" height="236" rx="16" fill="none" stroke="#C89B3C" stroke-width="2" opacity=".4"/>

  <!-- gold khokhloma flourish, upper band -->
  <g stroke="#C89B3C" stroke-width="2.4" fill="none" opacity=".75" stroke-linecap="round">
    <path d="M70 52 Q110 40 150 52 Q120 60 150 70 Q110 64 70 70 Q100 60 70 52 Z"/>
    <path d="M150 52 Q180 44 210 54"/>
    <circle cx="60" cy="52" r="4" fill="#E8C878" stroke="none"/>
  </g>
  <g stroke="#C89B3C" stroke-width="2.4" fill="none" opacity=".7" stroke-linecap="round">
    <path d="M570 226 Q530 238 490 226 Q520 218 490 208 Q530 214 570 208 Q540 218 570 226 Z"/>
    <circle cx="580" cy="226" r="4" fill="#E8C878" stroke="none"/>
  </g>

  <!-- face-down stock, upper-left, with a crosswise trump card beneath -->
  <!-- trump card lies sideways (a diamond — trump) -->
  <g transform="translate(72 150) rotate(90)">
    <rect x="6" y="8" width="104" height="146" rx="9" fill="#120608" opacity=".4"/>
    <rect width="104" height="146" rx="9" fill="#FBF5E6" stroke="#2b2320" stroke-width="3"/>
    <path d="M52 40 Q60 60 70 73 Q60 86 52 106 Q44 86 34 73 Q44 60 52 40 Z" fill="#C03A2B"/>
  </g>
  <!-- the stock on top -->
  <g transform="translate(96 78)">
    <rect x="6" y="8" width="104" height="146" rx="9" fill="#120608" opacity=".35"/>
    <rect width="104" height="146" rx="9" fill="#8E2323" stroke="#2b2320" stroke-width="3"/>
    <rect x="9" y="9" width="86" height="128" rx="6" fill="url(#dkback)" stroke="#E8C878" stroke-width="2"/>
  </g>

  <!-- battlefield: an attack card with a trump beating it, overlapping -->
  <!-- attack: a black King-ish card (10 of spades) -->
  <g transform="translate(282 70) rotate(-4)">
    <rect x="7" y="9" width="120" height="168" rx="10" fill="#120608" opacity=".4"/>
    <rect width="120" height="168" rx="10" fill="#FDFBF7" stroke="#2b2320" stroke-width="3"/>
    <!-- a spade glyph (drawn path, no text) -->
    <path d="M60 44 C84 70 92 88 74 100 C64 106 58 99 60 90 C58 99 52 106 42 100 C24 88 36 70 60 44 Z M48 118 C54 110 56 100 60 90 C64 100 66 110 72 118 Z" fill="#26221E"/>
  </g>
  <!-- defence: a trump (diamond, red) card beating it, overlapping down-right -->
  <g transform="translate(338 108) rotate(5)">
    <rect x="7" y="9" width="120" height="168" rx="10" fill="#120608" opacity=".45"/>
    <rect width="120" height="168" rx="10" fill="#FBF5E6" stroke="#2b2320" stroke-width="3"/>
    <!-- gold trump corner mark -->
    <rect x="6" y="6" width="108" height="156" rx="7" fill="none" stroke="#C89B3C" stroke-width="2" opacity=".55"/>
    <!-- diamond glyph (trump suit) -->
    <path d="M60 50 Q74 78 86 92 Q74 106 60 134 Q46 106 34 92 Q46 78 60 50 Z" fill="#C03A2B"/>
  </g>

  <!-- a fanned hand, lower-right -->
  <g transform="translate(470 150)">
    <g transform="rotate(-16)">
      <rect width="80" height="116" rx="8" fill="#FDFBF7" stroke="#2b2320" stroke-width="2.6"/>
      <path d="M40 30 Q48 48 56 58 Q48 68 40 86 Q32 68 24 58 Q32 48 40 30 Z" fill="#C03A2B"/>
    </g>
    <g transform="translate(34 -6) rotate(-2)">
      <rect width="80" height="116" rx="8" fill="#FDFBF7" stroke="#2b2320" stroke-width="2.6"/>
      <path d="M40 30 C56 48 62 62 48 70 C40 75 35 69 40 62 C35 69 30 75 22 70 C8 62 24 48 40 30 Z M30 84 C36 76 38 68 40 60 C42 68 44 76 50 84 Z" fill="#26221E"/>
    </g>
    <g transform="translate(70 8) rotate(12)">
      <rect width="80" height="116" rx="8" fill="#FBF5E6" stroke="#2b2320" stroke-width="2.6"/>
      <rect x="4" y="4" width="72" height="108" rx="5" fill="none" stroke="#C89B3C" stroke-width="1.6" opacity=".5"/>
      <path d="M40 30 Q54 56 64 68 Q54 80 40 92 Q26 80 16 68 Q26 56 40 30 Z" fill="#C03A2B"/>
    </g>
  </g>
</svg>
