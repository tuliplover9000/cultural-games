    <rect width="132" height="184" rx="9" fill="#F4EAD8" stroke="#FFFFFF" stroke-width="2"/>
    <rect x="6" y="6" width="120" height="172" rx="7" fill="none" stroke="#FFFFFF" stroke-width="2.5"/>
    <rect x="11" y="11" width="110" height="162" rx="6" fill="none" stroke="#B23A2E" stroke-width="2.5"/>
    <circle cx="66" cy="92" r="46" fill="none" stroke="#B23A2E" stroke-width="1.8" opacity=".8"/>
    <g transform="translate(11 13) scale(1.1)" stroke="#26221E" stroke-width="1.6" stroke-linejoin="round">
      <path d="M73 69 q7 -4 5 2 q-2 5 -6 2" fill="none"/>
      <path d="M38 84 L37 95 L42 95 L42 86 Z M50 87 L50 96 L55 96 L55 87 Z M63 86 L63 95 L68 95 L67 85 Z" fill="#B23A2E"/>
      <path d="M27 58 L22 49 L33 55 Z" fill="#B23A2E"/>
      <ellipse cx="53" cy="74" rx="21" ry="13.5" fill="#B23A2E"/>
      <circle cx="30" cy="67" r="9.5" fill="#B23A2E"/>
      <ellipse cx="21.5" cy="70" rx="3.6" ry="4.6" fill="#F4EAD8"/>
      <circle cx="21" cy="68.6" r="0.8" fill="#26221E" stroke="none"/>
      <circle cx="21" cy="71.6" r="0.8" fill="#26221E" stroke="none"/>
      <circle cx="30.5" cy="64" r="1.2" fill="#26221E" stroke="none"/>
      <circle cx="55" cy="72" r="7" fill="#F4EAD8"/>
      <path d="M55 65 a7 7 0 0 1 0 14 a3.5 3.5 0 0 1 0 -7 a3.5 3.5 0 0 0 0 -7 Z" fill="#2E6B4F" stroke="none"/>
      <circle cx="55" cy="68.5" r="1.1" fill="#2E6B4F" stroke="none"/>
      <circle cx="55" cy="75.5" r="1.1" fill="#F4EAD8" stroke="none"/>
    </g>
  </g>

  <!-- fanned hand of three pip cards -->
  <g transform="rotate(-16 450 350)">
    <rect x="318" y="58" width="132" height="184" rx="9" fill="#1C1410" opacity=".25" transform="translate(5 7)"/>
    <rect x="318" y="58" width="132" height="184" rx="9" fill="#F4EAD8" stroke="#26221E" stroke-width="2.5"/>
    <use href="#tls" x="384" y="100"/><use href="#tls" x="384" y="150"/><use href="#tls" x="384" y="200"/>
  </g>
  <g transform="rotate(-3 450 350)">
    <rect x="318" y="54" width="132" height="184" rx="9" fill="#1C1410" opacity=".25" transform="translate(5 7)"/>
    <rect x="318" y="54" width="132" height="184" rx="9" fill="#F4EAD8" stroke="#26221E" stroke-width="2.5"/>
    <use href="#tlh" x="354" y="92"/><use href="#tlh" x="414" y="92"/>
    <use href="#tlh" x="354" y="186"/><use href="#tlh" x="414" y="186"/>
  </g>
  <g transform="rotate(11 450 350)">
    <rect x="318" y="58" width="132" height="184" rx="9" fill="#1C1410" opacity=".25" transform="translate(5 7)"/>
    <rect x="318" y="58" width="132" height="184" rx="9" fill="#F4EAD8" stroke="#26221E" stroke-width="2.5"/>
    <use href="#tlz" x="384" y="150"/>
  </g>

  <!-- watermelon seeds -->
  <g fill="#1C1410">
    <path d="M232 226 C238 220 246 221 248 228 C250 235 243 241 236 238 C230 235 229 230 232 226 Z"/>
    <path d="M270 244 C276 238 284 239 286 246 C288 253 281 259 274 256 C268 253 267 248 270 244 Z"/>
    <path d="M206 252 C212 246 220 247 222 254 C224 261 217 267 210 264 C204 261 203 256 206 252 Z"/>
