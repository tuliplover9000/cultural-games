<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 280" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- chieu sedge weave -->
    <pattern id="tlm" width="15" height="13" patternUnits="userSpaceOnUse">
      <rect width="15" height="13" fill="#C9A45C"/>
      <rect width="15" height="6" fill="#BD9852" opacity=".5"/>
      <rect width="5" height="13" fill="#D4B26C" opacity=".45"/>
    </pattern>
    <path id="tls" d="M0 -11 C7 -3 11 2 7 7 C4 10.5 1.5 8.5 0.8 6 L2.5 12 L-2.5 12 L-0.8 6 C-1.5 8.5 -4 10.5 -7 7 C-11 2 -7 -3 0 -11 Z" fill="#26221E"/>
    <path id="tlh" d="M0 5 C0 -1 -5 -6 -9 -4 C-14 -2 -13 5 -8 9 L0 16 L8 9 C13 5 14 -2 9 -4 C5 -6 0 -1 0 5 Z" fill="#C03A2B"/>
    <path id="tlz" d="M-7 -5 L0 -12 L7 -5 L0 2 Z M-7 5 L0 -2 L7 5 L0 12 Z" fill="#1C1410"/>
  </defs>

  <rect width="640" height="280" fill="url(#tlm)"/>

  <!-- red stamped border sliver, left edge -->
  <rect width="10" height="280" fill="#B23A2E"/>
  <rect x="38" width="5" height="280" fill="#B23A2E"/>
  <g fill="#B23A2E">
    <path d="M24 6 L33 18 L24 30 L15 18 Z"/><path d="M24 50 L33 62 L24 74 L15 62 Z"/>
    <path d="M24 94 L33 106 L24 118 L15 106 Z"/><path d="M24 138 L33 150 L24 162 L15 150 Z"/>
    <path d="M24 182 L33 194 L24 206 L15 194 Z"/><path d="M24 226 L33 238 L24 250 L15 238 Z"/>
    <path d="M24 270 L33 282 L24 294 L15 282 Z"/>
  </g>

  <!-- Dong Ho pig card back -->
  <g transform="translate(112 60) rotate(-9)">
