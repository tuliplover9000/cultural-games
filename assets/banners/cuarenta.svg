<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 280" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- Otavalo woven band -->
    <pattern id="cuot" width="66" height="18" patternUnits="userSpaceOnUse">
      <rect width="66" height="18" fill="#A93226"/>
      <rect x="16" width="10" height="18" fill="#E8A33D"/>
      <rect x="26" width="12" height="18" fill="#2E6B5A"/>
      <rect x="38" width="6" height="18" fill="#F3E6C8"/>
      <rect x="44" width="12" height="18" fill="#3C4E7A"/>
      <rect x="56" width="10" height="18" fill="#E8A33D"/>
      <path d="M4 22 L24 -2 M34 22 L54 -2" stroke="#FFFFFF" stroke-width="2" opacity=".16"/>
    </pattern>
    <!-- tienda-deck lattice back -->
    <pattern id="culat" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M0 24 L24 0 M-6 6 L6 -6 M18 30 L30 18 M0 0 L24 24 M18 -6 L30 6 M-6 18 L6 30" stroke="#F3E6C8" stroke-width="2" opacity=".5" fill="none"/>
    </pattern>
    <path id="cuh" d="M0 5 C0 -1 -5 -6 -9 -4 C-14 -2 -13 5 -8 9 L0 16 L8 9 C13 5 14 -2 9 -4 C5 -6 0 -1 0 5 Z" fill="#C03A2B"/>
    <path id="cud" d="M0 -11 L8 0 L0 11 L-8 0 Z" fill="#C03A2B"/>
  </defs>

  <!-- warm wood table with plank seams -->
  <rect width="640" height="280" fill="#5C3A21"/>
  <rect y="96" width="640" height="3" fill="#4A2C16" opacity=".7"/>
  <rect y="198" width="640" height="3" fill="#4A2C16" opacity=".7"/>
  <rect x="40" y="130" width="180" height="5" rx="2.5" fill="#6A4528" opacity=".5"/>
  <rect x="430" y="240" width="150" height="5" rx="2.5" fill="#6A4528" opacity=".5"/>

  <!-- Otavalo stripe sliver along the top edge -->
  <rect width="640" height="18" fill="url(#cuot)"/>
  <rect y="17" width="640" height="2" fill="#140A04" opacity=".65"/>

  <!-- face-down lattice card -->
  <g transform="translate(96 78) rotate(-13)">
    <rect x="6" y="8" width="130" height="180" rx="10" fill="#2e1a0c" opacity=".3"/>
    <rect width="130" height="180" rx="10" fill="#8E2323" stroke="#2b2320" stroke-width="3"/>
    <rect x="10" y="10" width="110" height="160" rx="6" fill="url(#culat)" stroke="#F3E6C8" stroke-width="2"/>
  </g>

  <!-- captured stack, bottom right -->
  <g transform="translate(488 212)">
    <rect x="10" y="14" width="130" height="180" rx="10" transform="rotate(7)" fill="#FDFBF7" stroke="#2b2320" stroke-width="3"/>
    <rect x="4" y="8" width="130" height="180" rx="10" transform="rotate(-3)" fill="#FDFBF7" stroke="#2b2320" stroke-width="3"/>
    <rect width="130" height="180" rx="10" transform="rotate(2)" fill="#8E2323" stroke="#2b2320" stroke-width="3"/>
    <rect x="10" y="10" width="110" height="160" rx="6" transform="rotate(2)" fill="url(#culat)" stroke="#F3E6C8" stroke-width="2"/>
  </g>

  <!-- la caida: 7 of hearts under... -->
  <g transform="translate(268 64) rotate(-6)">
    <rect x="6" y="8" width="130" height="180" rx="10" fill="#2e1a0c" opacity=".3"/>
    <rect width="130" height="180" rx="10" fill="#FDFBF7" stroke="#2b2320" stroke-width="3"/>
    <use href="#cuh" x="34" y="38"/><use href="#cuh" x="34" y="82"/><use href="#cuh" x="34" y="126"/>
    <use href="#cuh" x="96" y="38"/><use href="#cuh" x="96" y="82"/><use href="#cuh" x="96" y="126"/>
    <use href="#cuh" x="65" y="60"/>
  </g>

  <!-- ...7 of diamonds landing on top -->
  <g transform="translate(330 96) rotate(11)">
    <rect x="6" y="8" width="130" height="180" rx="10" fill="#2e1a0c" opacity=".35"/>
    <rect width="130" height="180" rx="10" fill="#FDFBF7" stroke="#2b2320" stroke-width="3"/>
    <use href="#cud" x="34" y="42"/><use href="#cud" x="34" y="90"/><use href="#cud" x="34" y="138"/>
    <use href="#cud" x="96" y="42"/><use href="#cud" x="96" y="90"/><use href="#cud" x="96" y="138"/>
    <use href="#cud" x="65" y="66"/>
  </g>
</svg>
