<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 280" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- light cow token (player) -->
    <g id="mbcow-l">
      <circle r="13" fill="#F2E6CC" stroke="#B79A63" stroke-width="2.4"/>
      <path d="M-4 -6 A6 6 0 0 1 -9 -2 M4 -6 A6 6 0 0 0 9 -2" fill="none" stroke="#8A7048" stroke-width="2.2" stroke-linecap="round"/>
    </g>
    <!-- dark cow token (opponent) -->
    <g id="mbcow-d">
      <circle r="13" fill="#5B3A1E" stroke="#2C1B0C" stroke-width="2.4"/>
      <path d="M-4 -6 A6 6 0 0 1 -9 -2 M4 -6 A6 6 0 0 0 9 -2" fill="none" stroke="#1F1208" stroke-width="2.2" stroke-linecap="round"/>
    </g>
  </defs>

  <!-- dark soil surround -->
  <rect width="640" height="280" fill="#2E1D10"/>
  <rect y="58" width="640" height="3" fill="#1F1208" opacity=".7"/>
  <rect y="216" width="640" height="3" fill="#1F1208" opacity=".7"/>
  <rect x="64" y="118" width="190" height="5" rx="2.5" fill="#5E3A1C" opacity=".5"/>
  <rect x="432" y="178" width="150" height="5" rx="2.5" fill="#5E3A1C" opacity=".5"/>

  <!-- earth board plate, centred (the 24-point board spans 200px, points 220..420 step 40) -->
  <rect x="208" y="20" width="224" height="224" rx="14" fill="#7A4F22" stroke="#2E1D10" stroke-width="4"/>
  <rect x="214" y="26" width="212" height="40" rx="8" fill="#9A6C34" opacity=".3"/>

  <!-- three concentric squares (outer 220..420, middle 260..380, inner 290..350) -->
  <g fill="none" stroke="#E0B05A" stroke-width="2.4">
    <rect x="220" y="20" width="200" height="200"/>
    <rect x="260" y="60" width="120" height="120"/>
    <rect x="290" y="90" width="60" height="60"/>
  </g>
  <!-- cross arms -->
  <g stroke="#E0B05A" stroke-width="2.4">
    <line x1="320" y1="20"  x2="320" y2="90"/>
    <line x1="320" y1="150" x2="320" y2="220"/>
    <line x1="220" y1="120" x2="290" y2="120"/>
    <line x1="350" y1="120" x2="420" y2="120"/>
  </g>
  <!-- four corner diagonals (signature) -->
  <g stroke="#E0B05A" stroke-width="1.6" opacity=".85">
    <line x1="220" y1="20"  x2="290" y2="90"/>
    <line x1="420" y1="20"  x2="350" y2="90"/>
    <line x1="220" y1="220" x2="290" y2="150"/>
    <line x1="420" y1="220" x2="350" y2="150"/>
  </g>
  <!-- brass point inlays at all 24 nodes -->
  <g fill="#D9A441">
    <circle cx="220" cy="20" r="3.4"/><circle cx="320" cy="20" r="3.4"/><circle cx="420" cy="20" r="3.4"/>
    <circle cx="260" cy="60" r="3.4"/><circle cx="380" cy="60" r="3.4"/>
    <circle cx="290" cy="90" r="3.4"/><circle cx="350" cy="90" r="3.4"/>
    <circle cx="220" cy="120" r="3.4"/><circle cx="260" cy="120" r="3.4"/><circle cx="380" cy="120" r="3.4"/><circle cx="420" cy="120" r="3.4"/>
    <circle cx="290" cy="150" r="3.4"/><circle cx="350" cy="150" r="3.4"/>
    <circle cx="260" cy="180" r="3.4"/><circle cx="380" cy="180" r="3.4"/>
    <circle cx="220" cy="220" r="3.4"/><circle cx="320" cy="220" r="3.4"/><circle cx="420" cy="220" r="3.4"/>
  </g>

  <!-- a light mill on the top outer row (3 light cows) -->
  <use href="#mbcow-l" x="220" y="20"/>
  <use href="#mbcow-l" x="320" y="20"/>
  <use href="#mbcow-l" x="420" y="20"/>
  <!-- dark cows defending the middle -->
  <use href="#mbcow-d" x="260" y="120"/>
  <use href="#mbcow-d" x="380" y="120"/>
  <use href="#mbcow-d" x="320" y="150"/>
  <!-- a couple more cows scattered on inner points -->
  <use href="#mbcow-l" x="290" y="90"/>
  <use href="#mbcow-d" x="350" y="150"/>

  <!-- cows waiting in hand, left -->
  <use href="#mbcow-l" x="110" y="150"/>
  <use href="#mbcow-l" x="142" y="168"/>
  <use href="#mbcow-l" x="90" y="176"/>
  <!-- a lone dark cow prowling, right -->
  <use href="#mbcow-d" x="520" y="118"/>
</svg>
