<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 280">
  <defs>
    <radialGradient id="pufire" cx="50%" cy="52%" r="62%">
      <stop offset="0%" stop-color="#7A4E33"/>
      <stop offset="55%" stop-color="#5E3B27"/>
      <stop offset="82%" stop-color="#4A2E1E"/>
      <stop offset="100%" stop-color="#2A201A"/>
    </radialGradient>
    <!-- corn-cob divider: ivory kernel rows on a pith core, husk tip below -->
    <g id="pucob">
      <path d="M0 27 C-4 33 -5 39 -2 42 L0 36 L2 42 C5 39 4 33 0 27 Z" fill="#D9BC8A"/>
      <rect x="-6" y="-30" width="12" height="58" rx="5.5" fill="#B98A5C" stroke="#8A6240" stroke-width="1"/>
      <line x1="-3" y1="-26" x2="-3" y2="24" stroke="#EFE6CE" stroke-width="2.6" stroke-dasharray="2.8 1.8" stroke-linecap="round"/>
      <line x1="0" y1="-28" x2="0" y2="26" stroke="#F6EFDC" stroke-width="2.8" stroke-dasharray="2.8 1.8" stroke-dashoffset="2.2" stroke-linecap="round"/>
      <line x1="3" y1="-26" x2="3" y2="24" stroke="#EFE6CE" stroke-width="2.6" stroke-dasharray="2.8 1.8" stroke-linecap="round"/>
    </g>
    <!-- yellow-maize split stick -->
    <g id="pustky">
      <rect x="-7" y="-19" width="14" height="38" rx="7" fill="#E8B83A" stroke="#B8860F" stroke-width="1.5"/>
      <path d="M-1 -13 V13" stroke="#B8860F" stroke-width="1.3" opacity="0.55"/>
      <path d="M-4 -14 a5 5 0 0 1 6 -2" stroke="#F6D87E" stroke-width="2" fill="none" stroke-linecap="round"/>
    </g>
    <!-- blue-black-maize bark stick -->
    <g id="pustkd">
      <rect x="-7" y="-19" width="14" height="38" rx="7" fill="#4A3C5C" stroke="#2E2540" stroke-width="1.5"/>
      <path d="M-1 -13 V13" stroke="#6B5B85" stroke-width="1.3" opacity="0.6"/>
      <path d="M-4 -14 a5 5 0 0 1 6 -2" stroke="#6B5B85" stroke-width="2" fill="none" stroke-linecap="round"/>
    </g>
    <!-- corn-kernel die -->
    <g id="puker">
      <path d="M0 -9 C6 -9 9 -4 8 2 C7 8 3 11 0 11 C-3 11 -7 8 -8 2 C-9 -4 -6 -9 0 -9 Z" fill="#E8B83A" stroke="#B8860F" stroke-width="1.4"/>
      <path d="M-4 -5 a5 4 0 0 1 5 -2" stroke="#F6D87E" stroke-width="1.6" fill="none" stroke-linecap="round"/>
    </g>
  </defs>

  <!-- night hut floor -->
  <rect width="640" height="280" fill="#2A201A"/>
  <!-- firelit clay pool -->
  <ellipse cx="320" cy="150" rx="332" ry="132" fill="url(#pufire)"/>
  <ellipse cx="320" cy="150" rx="190" ry="84" fill="#F5B45E" opacity="0.05"/>
  <!-- swept-broom arcs in the clay -->
  <path d="M95 208 q225 -32 455 -6" stroke="#3B281C" stroke-width="2" fill="none" opacity="0.5"/>
  <path d="M125 224 q205 -26 405 -2" stroke="#3B281C" stroke-width="2" fill="none" opacity="0.4"/>
  <path d="M110 86 q220 -22 430 4" stroke="#3B281C" stroke-width="2" fill="none" opacity="0.4"/>

  <!-- indigo jaspe textile band along the top crop zone -->
  <rect x="0" y="0" width="640" height="34" fill="#1E2A45"/>
  <g fill="#C9CFDB" opacity="0.55">
    <rect x="24" y="8" width="22" height="3" rx="1.5"/>
    <rect x="74" y="20" width="16" height="3" rx="1.5"/>
    <rect x="120" y="11" width="24" height="3" rx="1.5"/>
    <rect x="172" y="23" width="14" height="3" rx="1.5"/>
    <rect x="214" y="6" width="18" height="3" rx="1.5"/>
    <rect x="262" y="17" width="22" height="3" rx="1.5"/>
    <rect x="316" y="9" width="15" height="3" rx="1.5"/>
    <rect x="356" y="22" width="20" height="3" rx="1.5"/>
    <rect x="406" y="7" width="24" height="3" rx="1.5"/>
    <rect x="458" y="18" width="16" height="3" rx="1.5"/>
    <rect x="502" y="10" width="22" height="3" rx="1.5"/>
    <rect x="552" y="21" width="14" height="3" rx="1.5"/>
    <rect x="594" y="8" width="20" height="3" rx="1.5"/>
    <rect x="48" y="27" width="12" height="2.6" rx="1.3"/>
    <rect x="240" y="27" width="12" height="2.6" rx="1.3"/>
    <rect x="436" y="27" width="12" height="2.6" rx="1.3"/>
    <rect x="586" y="27" width="12" height="2.6" rx="1.3"/>
  </g>
  <rect x="0" y="32" width="640" height="3" fill="#141C30"/>

  <!-- row of corn-cob dividers receding across the frame -->
  <use href="#pucob" transform="translate(98 152) rotate(-3)"/>
  <use href="#pucob" transform="translate(188 150) rotate(2)"/>
  <use href="#pucob" transform="translate(277 149) rotate(-2) scale(0.97)"/>
  <use href="#pucob" transform="translate(366 148) rotate(3) scale(0.94)"/>
  <use href="#pucob" transform="translate(455 146) rotate(-2) scale(0.92)"/>
  <use href="#pucob" transform="translate(543 145) rotate(2) scale(0.9)"/>

  <!-- yellow sticks racing right -->
  <ellipse cx="142" cy="172" rx="13" ry="4" fill="#1E140D" opacity="0.5"/>
  <use href="#pustky" transform="translate(142 152) rotate(-7)"/>
  <ellipse cx="322" cy="171" rx="13" ry="4" fill="#1E140D" opacity="0.5"/>
  <use href="#pustky" transform="translate(322 151) rotate(5)"/>
  <!-- dark stick racing left -->
  <ellipse cx="500" cy="169" rx="13" ry="4" fill="#1E140D" opacity="0.5"/>
  <use href="#pustkd" transform="translate(500 149) rotate(8)"/>

  <!-- the signature 3-high prisoner stack: dark carrier atop two yellow captives -->
  <ellipse cx="412" cy="172" rx="19" ry="5" fill="#1E140D" opacity="0.55"/>
  <use href="#pustky" transform="translate(414 153) rotate(6)"/>
  <use href="#pustky" transform="translate(410 141) rotate(-5)"/>
  <use href="#pustkd" transform="translate(412 129) rotate(2)"/>

  <!-- four kernel dice scattered in the warm light pool, two eyes up -->
  <ellipse cx="240" cy="222" rx="10" ry="3.4" fill="#1E140D" opacity="0.45"/>
  <use href="#puker" transform="translate(240 216) rotate(-10)"/>
  <circle cx="239" cy="214" r="3.2" fill="#2B2622"/>
  <ellipse cx="284" cy="230" rx="10" ry="3.4" fill="#1E140D" opacity="0.45"/>
  <use href="#puker" transform="translate(284 224) rotate(8)"/>
  <ellipse cx="332" cy="218" rx="10" ry="3.4" fill="#1E140D" opacity="0.45"/>
  <use href="#puker" transform="translate(332 212) rotate(-5)"/>
  <circle cx="332" cy="210" r="3.2" fill="#2B2622"/>
  <ellipse cx="374" cy="228" rx="10" ry="3.4" fill="#1E140D" opacity="0.45"/>
  <use href="#puker" transform="translate(374 222) rotate(12)"/>

  <!-- faint ember sparks at the light's edge -->
  <circle cx="84" cy="220" r="1.6" fill="#E8923A" opacity="0.55"/>
  <circle cx="70" cy="206" r="1.2" fill="#F5B45E" opacity="0.4"/>
  <circle cx="96" cy="232" r="1.1" fill="#E8923A" opacity="0.35"/>
</svg>
