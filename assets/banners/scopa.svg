<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 280" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- coin (oros) pip -->
    <g id="scco">
      <circle r="9" fill="none" stroke="#C89B3C" stroke-width="2.4"/>
      <circle r="4" fill="none" stroke="#C89B3C" stroke-width="1.6"/>
      <circle r="1.6" fill="#C89B3C"/>
    </g>
    <!-- card-back weave -->
    <pattern id="scback" width="22" height="22" patternUnits="userSpaceOnUse">
      <rect width="22" height="22" fill="#2E6B5A"/>
      <path d="M0 22 L22 0 M-4 4 L4 -4 M18 26 L26 18" stroke="#E8D9B0" stroke-width="1.6" opacity=".4" fill="none"/>
    </pattern>
  </defs>

  <!-- warm wooden table -->
  <rect width="640" height="280" fill="#6A4528"/>
  <rect y="92" width="640" height="3" fill="#52351E" opacity=".7"/>
  <rect y="196" width="640" height="3" fill="#52351E" opacity=".7"/>
  <rect x="60" y="140" width="190" height="5" rx="2.5" fill="#7C5530" opacity=".5"/>
  <rect x="420" y="232" width="150" height="5" rx="2.5" fill="#7C5530" opacity=".5"/>

  <!-- olive felt playing cloth -->
  <rect x="40" y="34" width="560" height="212" rx="18" fill="#3A5A34"/>
  <rect x="40" y="34" width="560" height="212" rx="18" fill="none" stroke="#2A4426" stroke-width="3"/>
  <!-- swept-clean lighter patch (a "scopa" left an empty area) -->
  <ellipse cx="468" cy="150" rx="92" ry="74" fill="#46683E" opacity=".55"/>

  <!-- face-down stock, upper-left -->
  <g transform="translate(74 70) rotate(-9)">
    <rect x="6" y="8" width="120" height="166" rx="10" fill="#241608" opacity=".3"/>
    <rect width="120" height="166" rx="10" fill="#8E2323" stroke="#2b2320" stroke-width="3"/>
    <rect x="10" y="10" width="100" height="146" rx="6" fill="url(#scback)" stroke="#E8D9B0" stroke-width="2"/>
  </g>

  <!-- captured pile, lower-right of the swept area -->
  <g transform="translate(516 168)">
    <rect x="8" y="12" width="116" height="160" rx="9" transform="rotate(6)" fill="#FDFBF7" stroke="#2b2320" stroke-width="3"/>
    <rect x="2" y="6" width="116" height="160" rx="9" transform="rotate(-3)" fill="#FDFBF7" stroke="#2b2320" stroke-width="3"/>
    <rect width="116" height="160" rx="9" transform="rotate(2)" fill="#8E2323" stroke="#2b2320" stroke-width="3"/>
    <rect x="9" y="9" width="98" height="142" rx="6" transform="rotate(2)" fill="url(#scback)" stroke="#E8D9B0" stroke-width="2"/>
  </g>

  <!-- a couple of small table cards fanned, lower-left -->
  <g transform="translate(196 150) rotate(8)">
    <rect x="6" y="8" width="104" height="146" rx="9" fill="#241608" opacity=".3"/>
    <rect width="104" height="146" rx="9" fill="#FDFBF7" stroke="#2b2320" stroke-width="3"/>
    <!-- a 3 of cups (red hearts stand-in) -->
    <path d="M52 38 l7 0 -3.5 6 z" fill="#C03A2B"/>
    <circle cx="52" cy="73" r="9" fill="none" stroke="#C03A2B" stroke-width="3"/>
    <circle cx="52" cy="73" r="3" fill="#C03A2B"/>
    <path d="M52 104 l7 0 -3.5 6 z" fill="#C03A2B"/>
  </g>

  <!-- THE SETTEBELLO — 7 of coins, centre, prominent -->
  <g transform="translate(290 56) rotate(-3)">
    <rect x="7" y="9" width="132" height="184" rx="11" fill="#241608" opacity=".35"/>
    <rect width="132" height="184" rx="11" fill="#FBF5E6" stroke="#2b2320" stroke-width="3"/>
    <rect x="6" y="6" width="120" height="172" rx="8" fill="none" stroke="#C89B3C" stroke-width="2" opacity=".5"/>
    <!-- "7" indices (drawn glyphs — no font dependency, per banner spec) -->
    <path d="M13 17 H27 L18 36" fill="none" stroke="#C03A2B" stroke-width="3.6" stroke-linecap="round" stroke-linejoin="round"/>
    <g transform="rotate(180 116 158)"><path d="M109 149 H123 L114 168" fill="none" stroke="#C03A2B" stroke-width="3.6" stroke-linecap="round" stroke-linejoin="round"/></g>
    <!-- seven gold coins -->
    <use href="#scco" x="44" y="56"/><use href="#scco" x="88" y="56"/>
    <use href="#scco" x="44" y="92"/><use href="#scco" x="66" y="92"/><use href="#scco" x="88" y="92"/>
    <use href="#scco" x="44" y="128"/><use href="#scco" x="88" y="128"/>
  </g>
</svg>
