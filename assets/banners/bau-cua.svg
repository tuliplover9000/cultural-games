<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 280" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- damask hint on the red cloth -->
    <pattern id="bcdm" width="56" height="56" patternUnits="userSpaceOnUse">
      <rect width="56" height="56" fill="#9E1B1B"/>
      <path d="M28 6 L40 28 L28 50 L16 28 Z" fill="#8A1414" opacity=".9"/>
      <circle cx="28" cy="28" r="5" fill="#AA2424" opacity=".8"/>
      <circle cx="0" cy="0" r="4" fill="#8A1414"/><circle cx="56" cy="0" r="4" fill="#8A1414"/>
      <circle cx="0" cy="56" r="4" fill="#8A1414"/><circle cx="56" cy="56" r="4" fill="#8A1414"/>
    </pattern>
    <g id="bcdie">
      <rect x="-25" y="-21" width="52" height="52" rx="10" fill="#3a0808" opacity=".4"/>
      <rect x="-26" y="-26" width="52" height="52" rx="10" fill="#F3E6C8" stroke="#c9ad7a" stroke-width="2"/>
    </g>
  </defs>

  <rect width="640" height="280" fill="url(#bcdm)"/>

  <!-- gold grid: 2 rows x 3 columns -->
  <g stroke="#E8B33C" stroke-width="4" fill="none">
    <line x1="213" y1="0" x2="213" y2="280"/>
    <line x1="427" y1="0" x2="427" y2="280"/>
    <line x1="0" y1="140" x2="640" y2="140"/>
  </g>
  <g stroke="#E8B33C" stroke-width="1.4" fill="none" opacity=".55">
    <line x1="206" y1="0" x2="206" y2="280"/><line x1="220" y1="0" x2="220" y2="280"/>
    <line x1="420" y1="0" x2="420" y2="280"/><line x1="434" y1="0" x2="434" y2="280"/>
    <line x1="0" y1="133" x2="640" y2="133"/><line x1="0" y1="147" x2="640" y2="147"/>
  </g>

  <!-- bầu: gourd (teal) -->
  <g transform="translate(106 92)">
    <circle cx="0" cy="14" r="22" fill="#2E6B5A"/>
    <circle cx="0" cy="-14" r="14" fill="#3D8270"/>
    <path d="M0 -28 L0 -36" stroke="#E8B33C" stroke-width="4" stroke-linecap="round"/>
    <path d="M0 -34 Q10 -42 14 -34 Q8 -28 0 -31 Z" fill="#2E6B5A"/>
    <ellipse cx="-7" cy="8" rx="6" ry="9" fill="#F3E6C8" opacity=".3"/>
  </g>

  <!-- cua: crab (gold) -->
  <g transform="translate(320 80)" fill="#E8B33C">
    <ellipse cx="0" cy="4" rx="22" ry="16"/>
    <path d="M-20 -4 Q-32 -14 -36 -24 Q-44 -30 -40 -36 Q-32 -38 -32 -28 Q-26 -20 -16 -10 Z"/>
    <path d="M20 -4 Q32 -14 36 -24 Q44 -30 40 -36 Q32 -38 32 -28 Q26 -20 16 -10 Z"/>
    <path d="M-18 12 L-32 20 M-14 17 L-26 28 M18 12 L32 20 M14 17 L26 28" stroke="#E8B33C" stroke-width="4" fill="none" stroke-linecap="round"/>
    <circle cx="-7" cy="-9" r="3.4" fill="#9E1B1B" stroke="#E8B33C" stroke-width="2.4"/>
    <circle cx="7" cy="-9" r="3.4" fill="#9E1B1B" stroke="#E8B33C" stroke-width="2.4"/>
  </g>

  <!-- tôm: shrimp (cream) -->
  <g transform="translate(533 92)" fill="#F3E6C8">
    <path d="M-22 -14 Q6 -26 18 -8 Q26 6 14 16 Q4 24 -4 18 Q8 16 12 6 Q14 -4 4 -10 Q-8 -16 -22 -14 Z"/>
    <path d="M-2 -16 Q2 -6 -2 4" stroke="#F3E6C8" stroke-width="3" fill="none"/>
    <path d="M8 -14 Q12 -4 8 6" stroke="#F3E6C8" stroke-width="3" fill="none"/>
    <path d="M-22 -14 Q-34 -20 -40 -30 M-22 -14 Q-36 -14 -44 -20" stroke="#F3E6C8" stroke-width="2.6" fill="none" stroke-linecap="round"/>
    <path d="M14 16 L22 26 L8 22 Z"/>
    <circle cx="-16" cy="-16" r="2.6" fill="#9E1B1B"/>
  </g>

  <!-- cá: fish (teal) -->
  <g transform="translate(106 196)" fill="#2E6B5A">
    <ellipse cx="2" cy="0" rx="24" ry="14"/>
    <path d="M-20 0 L-38 -12 L-32 0 L-38 12 Z"/>
    <path d="M2 -13 Q10 -24 18 -13 Z"/>
    <path d="M4 13 Q10 22 16 12 Z"/>
    <circle cx="16" cy="-3" r="3" fill="#F3E6C8"/>
    <path d="M-6 -6 Q0 0 -6 6 M2 -7 Q8 0 2 7" stroke="#F3E6C8" stroke-width="2" fill="none" opacity=".55"/>
  </g>

  <!-- gà: rooster (gold) -->
  <g transform="translate(320 202)" fill="#E8B33C">
    <ellipse cx="-2" cy="2" rx="18" ry="13"/>
    <path d="M-16 -2 Q-34 -16 -30 -34 Q-22 -26 -18 -22 Q-22 -34 -14 -40 Q-12 -28 -10 -22 Q-4 -30 2 -28 Q-4 -18 -8 -10 Z"/>
    <path d="M10 -4 Q18 -10 20 -18 L24 -16 Q24 -8 16 0 Z"/>
    <circle cx="20" cy="-18" r="6"/>
    <path d="M17 -27 Q20 -31 23 -27 Q25 -24 21 -23 Z" fill="#9E1B1B"/>
    <path d="M26 -17 L33 -15 L26 -12 Z" fill="#9E1B1B"/>
    <path d="M-4 14 L-4 24 M4 13 L4 24" stroke="#E8B33C" stroke-width="3.4" fill="none" stroke-linecap="round"/>
  </g>

  <!-- nai: deer (cream) -->
  <g transform="translate(533 200)" fill="#F3E6C8">
    <ellipse cx="-2" cy="-2" rx="19" ry="11"/>
    <path d="M14 -8 Q20 -14 22 -24 L28 -22 Q28 -14 20 -4 Z"/>
    <circle cx="24" cy="-26" r="5.6"/>
    <path d="M22 -31 L16 -44 L23 -36 L24 -46 L27 -36 L34 -42 L27 -30 Z"/>
    <path d="M-14 6 L-15 22 M-5 8 L-5 22 M5 8 L5 22 M13 6 L14 22" stroke="#F3E6C8" stroke-width="3.2" fill="none" stroke-linecap="round"/>
    <path d="M-18 -6 L-24 -12" stroke="#F3E6C8" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- three ivory dice tossed in the center -->
  <g transform="translate(282 134) rotate(-10)">
    <use href="#bcdie"/>
    <circle cx="0" cy="8" r="11" fill="#2E6B5A"/>
    <circle cx="0" cy="-8" r="7" fill="#3D8270"/>
  </g>
  <g transform="translate(346 122) rotate(8)">
    <use href="#bcdie"/>
    <ellipse cx="0" cy="2" rx="13" ry="9" fill="#C03A2B"/>
    <path d="M-11 -4 Q-18 -12 -20 -18 M11 -4 Q18 -12 20 -18" stroke="#C03A2B" stroke-width="3.4" fill="none" stroke-linecap="round"/>
    <circle cx="-4" cy="-2" r="1.8" fill="#F3E6C8"/><circle cx="4" cy="-2" r="1.8" fill="#F3E6C8"/>
  </g>
  <g transform="translate(322 178) rotate(-4)">
    <use href="#bcdie"/>
    <ellipse cx="1" cy="0" rx="13" ry="8" fill="#2E6B5A"/>
    <path d="M-11 0 L-20 -7 L-17 0 L-20 7 Z" fill="#2E6B5A"/>
    <circle cx="9" cy="-2" r="1.8" fill="#F3E6C8"/>
  </g>
</svg>
