<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- 3D dice — top face + right face + left face (isometric-ish) -->

  <!-- Drop shadow -->
  <ellipse cx="33" cy="58" rx="18" ry="4" fill="black" opacity="0.25"/>

  <!-- Left face (darker white) — shows 3 dots -->
  <polygon points="10,20 32,32 32,54 10,42" fill="#C8C8C8"/>
  <circle cx="17" cy="30" r="2.8" fill="#C41E3A"/>
  <circle cx="21" cy="41" r="2.8" fill="#C41E3A"/>
  <circle cx="25" cy="33" r="2.8" fill="#C41E3A"/>

  <!-- Right face (medium white) — shows 2 dots -->
  <polygon points="32,32 54,20 54,42 32,54" fill="#E8E8E8"/>
  <circle cx="44" cy="28" r="2.8" fill="#C41E3A"/>
  <circle cx="42" cy="46" r="2.8" fill="#C41E3A"/>

  <!-- Top face (bright white) — shows 5 dots -->
  <polygon points="10,20 32,8 54,20 32,32" fill="#FFFFFF"/>
  <circle cx="22" cy="17" r="2.8" fill="#C41E3A"/>
  <circle cx="42" cy="17" r="2.8" fill="#C41E3A"/>
  <circle cx="32" cy="21" r="2.8" fill="#C41E3A"/>
  <circle cx="22" cy="25" r="2.8" fill="#C41E3A"/>
  <circle cx="42" cy="25" r="2.8" fill="#C41E3A"/>

  <!-- Edges -->
  <polygon points="10,20 32,8 54,20 32,32" fill="none" stroke="#999" stroke-width="0.8"/>
  <polygon points="10,20 32,32 32,54 10,42" fill="none" stroke="#999" stroke-width="0.8"/>
  <polygon points="32,32 54,20 54,42 32,54" fill="none" stroke="#999" stroke-width="0.8"/>

  <!-- Corner highlight on top edge -->
  <line x1="10" y1="20" x2="32" y2="8" stroke="white" stroke-width="1.2" opacity="0.6"/>
  <line x1="32" y1="8" x2="54" y2="20" stroke="white" stroke-width="1.2" opacity="0.6"/>
</svg>
