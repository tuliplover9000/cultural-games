<svg xmlns="http://www.w3.org/2000/svg" viewBox="-140 -140 280 280" width="280" height="280">
  <!-- Outermost ring: coral/red -->
  <circle r="128" fill="none" stroke="#E24B4A" stroke-width="2.5"/>
  <circle r="121" fill="none" stroke="#E24B4A" stroke-width="0.5" stroke-dasharray="4 3" opacity="0.6"/>

  <!-- 20 calendar dots -->
  <g fill="#E24B4A" opacity="0.9">
    <circle r="3.5" cx="0" cy="-121" transform="rotate(0)"/>
    <circle r="2"   cx="0" cy="-121" transform="rotate(18)"  opacity="0.5"/>
    <circle r="3.5" cx="0" cy="-121" transform="rotate(36)"/>
    <circle r="2"   cx="0" cy="-121" transform="rotate(54)"  opacity="0.5"/>
    <circle r="3.5" cx="0" cy="-121" transform="rotate(72)"/>
    <circle r="2"   cx="0" cy="-121" transform="rotate(90)"  opacity="0.5"/>
    <circle r="3.5" cx="0" cy="-121" transform="rotate(108)"/>
    <circle r="2"   cx="0" cy="-121" transform="rotate(126)" opacity="0.5"/>
    <circle r="3.5" cx="0" cy="-121" transform="rotate(144)"/>
    <circle r="2"   cx="0" cy="-121" transform="rotate(162)" opacity="0.5"/>
    <circle r="3.5" cx="0" cy="-121" transform="rotate(180)"/>
    <circle r="2"   cx="0" cy="-121" transform="rotate(198)" opacity="0.5"/>
    <circle r="3.5" cx="0" cy="-121" transform="rotate(216)"/>
    <circle r="2"   cx="0" cy="-121" transform="rotate(234)" opacity="0.5"/>
    <circle r="3.5" cx="0" cy="-121" transform="rotate(252)"/>
    <circle r="2"   cx="0" cy="-121" transform="rotate(270)" opacity="0.5"/>
    <circle r="3.5" cx="0" cy="-121" transform="rotate(288)"/>
    <circle r="2"   cx="0" cy="-121" transform="rotate(306)" opacity="0.5"/>
    <circle r="3.5" cx="0" cy="-121" transform="rotate(324)"/>
    <circle r="2"   cx="0" cy="-121" transform="rotate(342)" opacity="0.5"/>
  </g>

  <!-- 8 step teeth: amber -->
  <g fill="#BA7517" fill-opacity="0.5" stroke="#EF9F27" stroke-width="0.8">
    <rect x="-7" y="-116" width="14" height="15" rx="2" transform="rotate(0)"/>
    <rect x="-7" y="-116" width="14" height="15" rx="2" transform="rotate(45)"/>
    <rect x="-7" y="-116" width="14" height="15" rx="2" transform="rotate(90)"/>
    <rect x="-7" y="-116" width="14" height="15" rx="2" transform="rotate(135)"/>
    <rect x="-7" y="-116" width="14" height="15" rx="2" transform="rotate(180)"/>
    <rect x="-7" y="-116" width="14" height="15" rx="2" transform="rotate(225)"/>
    <rect x="-7" y="-116" width="14" height="15" rx="2" transform="rotate(270)"/>
    <rect x="-7" y="-116" width="14" height="15" rx="2" transform="rotate(315)"/>
  </g>

  <!-- 4 main cardinal spikes: amber/gold -->
  <g fill="#EF9F27">
    <polygon points="0,-108 -14,-52 14,-52"/>
    <polygon points="0,108 -14,52 14,52"/>
    <polygon points="-108,0 -52,-14 -52,14"/>
    <polygon points="108,0 52,-14 52,14"/>
  </g>

  <!-- 4 intercardinal spikes: coral -->
  <g fill="#E24B4A" transform="rotate(45)">
    <polygon points="0,-100 -9,-56 9,-56"/>
    <polygon points="0,100 -9,56 9,56"/>
    <polygon points="-100,0 -56,-9 -56,9"/>
    <polygon points="100,0 56,-9 56,9"/>
  </g>

  <!-- Mid ring: teal -->
  <circle r="50" fill="none" stroke="#1D9E75" stroke-width="1.8"/>
  <circle r="44" fill="none" stroke="#1D9E75" stroke-width="0.5" opacity="0.5"/>

  <!-- Rotated inner square ring: amber -->
  <rect x="-50" y="-50" width="100" height="100" rx="4" fill="none" stroke="#EF9F27" stroke-width="1.2" transform="rotate(45)"/>

  <!-- 8 short rays -->
  <g stroke="#FAC775" stroke-width="1.5" stroke-linecap="round" opacity="0.7">
    <line x1="0" y1="-38" x2="0" y2="-42" transform="rotate(0)"/>
    <line x1="0" y1="-38" x2="0" y2="-42" transform="rotate(45)"/>
    <line x1="0" y1="-38" x2="0" y2="-42" transform="rotate(90)"/>
    <line x1="0" y1="-38" x2="0" y2="-42" transform="rotate(135)"/>
    <line x1="0" y1="-38" x2="0" y2="-42" transform="rotate(180)"/>
    <line x1="0" y1="-38" x2="0" y2="-42" transform="rotate(225)"/>
    <line x1="0" y1="-38" x2="0" y2="-42" transform="rotate(270)"/>
    <line x1="0" y1="-38" x2="0" y2="-42" transform="rotate(315)"/>
  </g>

  <!-- Center disc -->
  <circle r="30" fill="#2C1A04"/>
  <circle r="28" fill="none" stroke="#EF9F27" stroke-width="0.8" opacity="0.4"/>

  <!-- Eye -->
  <path d="M-20,0 Q0,-16 20,0 Q0,16 -20,0 Z" fill="#EF9F27"/>
  <circle r="9" fill="#FAC775"/>
  <circle r="4" fill="#2C1A04"/>
  <circle r="1.8" cx="3" cy="-3" fill="white" opacity="0.6"/>
</svg>
