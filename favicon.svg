<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Shadow -->
  <rect x="6" y="8" width="52" height="52" rx="12" fill="black" opacity="0.18"/>
  <!-- Dice face -->
  <rect x="4" y="4" width="52" height="52" rx="11" fill="white"/>
  <!-- Subtle inner bevel -->
  <rect x="4" y="4" width="52" height="52" rx="11" fill="none" stroke="#E0E0E0" stroke-width="1.5"/>

  <!-- 5 dots -->
  <circle cx="18" cy="18" r="5" fill="#C41E3A"/>
  <circle cx="46" cy="18" r="5" fill="#C41E3A"/>
  <circle cx="32" cy="32" r="5" fill="#C41E3A"/>
  <circle cx="18" cy="46" r="5" fill="#C41E3A"/>
  <circle cx="46" cy="46" r="5" fill="#C41E3A"/>
</svg>
