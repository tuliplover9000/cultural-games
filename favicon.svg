<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="#1A0C02"/>

  <!-- Dice body -->
  <rect x="10" y="10" width="44" height="44" rx="9" fill="#EF9F27"/>
  <!-- Inner shadow top -->
  <rect x="10" y="10" width="44" height="44" rx="9" fill="none" stroke="#BA7517" stroke-width="2" opacity="0.5"/>
  <!-- Shine -->
  <rect x="12" y="12" width="20" height="8" rx="4" fill="white" opacity="0.12"/>

  <!-- Dots: 5-face layout -->
  <circle cx="22" cy="22" r="4.5" fill="#2C1A04"/>
  <circle cx="42" cy="22" r="4.5" fill="#2C1A04"/>
  <circle cx="32" cy="32" r="4.5" fill="#2C1A04"/>
  <circle cx="22" cy="42" r="4.5" fill="#2C1A04"/>
  <circle cx="42" cy="42" r="4.5" fill="#2C1A04"/>
</svg>
